<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Iron Log</title>

  <!-- PWA / iOS Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20180%20180'%3E%3Crect%20width='180'%20height='180'%20rx='40'%20fill='%23000'/%3E%3Crect%20x='34'%20y='34'%20width='112'%20height='112'%20rx='24'%20fill='%23F97316'/%3E%3Cpath%20d='M70%2070l40%2040M120%20120l5%205M55%2055l5%205M105%20130l20-20M55%2070l20-20M60%2080l35-35M125%20120l35-35'%20stroke='%23000'%20stroke-width='10'%20stroke-linecap='round'%20fill='none'/%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      background: #000;
      color: #fafafa;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .font-display { font-family: 'Anton', sans-serif; font-weight: 400; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    button { -webkit-tap-highlight-color: transparent; }
    /* Initial loader */
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #000; color: #525252; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      z-index: 100;
    }
    #loader.hide { display: none; }
  </style>
</head>
<body>
  <div id="loader">Loading…</div>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    // ============================================================
    // ICONS (inline SVG, mimics lucide)
    // ============================================================
    const Icon = ({ children, size = 18, strokeWidth = 2, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth}
        strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Dumbbell = (p) => <Icon {...p}>
      <path d="M14.4 14.4 9.6 9.6"/>
      <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/>
      <path d="m21.5 21.5-1.4-1.4"/>
      <path d="M3.9 3.9 2.5 2.5"/>
      <path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/>
    </Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Minus = (p) => <Icon {...p}><path d="M5 12h14"/></Icon>;
    const Flame = (p) => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
    const ArrowUp = (p) => <Icon {...p}><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></Icon>;
    const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
    const Award = (p) => <Icon {...p}><circle cx="12" cy="8" r="6"/><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/></Icon>;
    const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
    const History = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Utensils = (p) => <Icon {...p}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></Icon>;
    const Camera = (p) => <Icon {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></Icon>;
    const Edit2 = (p) => <Icon {...p}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></Icon>;
    const Trash = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
    const Loader = (p) => <Icon {...p}><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></Icon>;
    const Home = (p) => <Icon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
    const BarChart = (p) => <Icon {...p}><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></Icon>;

    // ============================================================
    // PROGRAM DEFINITIONS
    // ============================================================
    const round5 = (n) => Math.round(n / 5) * 5;

    const WEEK_SCHEMES = {
      1: { label: '5s WEEK', sets: [
        { pct: 0.65, reps: 5, isAmrap: false },
        { pct: 0.75, reps: 5, isAmrap: false },
        { pct: 0.85, reps: 5, isAmrap: true, minReps: 5 },
      ]},
      2: { label: '3s WEEK', sets: [
        { pct: 0.70, reps: 3, isAmrap: false },
        { pct: 0.80, reps: 3, isAmrap: false },
        { pct: 0.90, reps: 3, isAmrap: true, minReps: 3 },
      ]},
      3: { label: 'PR WEEK', sets: [
        { pct: 0.75, reps: 5, isAmrap: false },
        { pct: 0.85, reps: 3, isAmrap: false },
        { pct: 0.95, reps: 1, isAmrap: true, minReps: 1 },
      ]},
      4: { label: 'DELOAD', sets: [
        { pct: 0.40, reps: 5, isAmrap: false },
        { pct: 0.50, reps: 5, isAmrap: false },
        { pct: 0.60, reps: 5, isAmrap: false },
      ]},
    };

    const ACCESSORIES = {
      'incline-db':       { name: 'Incline Dumbbell Press', sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 50 },
      'close-grip':       { name: 'Close-Grip Bench Press', sets: 3, repsLow: 6,  repsHigh: 8,  inc: 5,  startWeight: 135 },
      'tricep-ext-tonal': { name: 'Tricep Extension (Tonal)', sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 50 },
      'decline-fly-tonal':{ name: 'Decline Chest Fly (Tonal)', sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 40 },
      'goblet-squat':     { name: 'Goblet Squat',           sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 50 },
      'lat-pulldown':     { name: 'Lat Pulldown',           sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 120 },
      'plank':            { name: 'Plank',                  sets: 3, repsLow: 30, repsHigh: 60, inc: 0,  startWeight: 0, isTimed: true },
      'romanian-dl':      { name: 'Romanian Deadlift',      sets: 3, repsLow: 8,  repsHigh: 10, inc: 10, startWeight: 135 },
      'leg-press':        { name: 'Leg Press',              sets: 3, repsLow: 10, repsHigh: 12, inc: 10, startWeight: 200 },
      'leg-curls':        { name: 'Lying Leg Curls',        sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 80 },
      'calf-raises':      { name: 'Standing Calf Raises',   sets: 3, repsLow: 12, repsHigh: 15, inc: 10, startWeight: 100 },
      'leg-raises':       { name: 'Hanging Leg Raises',     sets: 3, repsLow: 10, repsHigh: 15, inc: 0,  startWeight: 0, isBodyweight: true },
      'pull-ups':         { name: 'Pull-Ups',               sets: 3, repsLow: 5,  repsHigh: 10, inc: 0,  startWeight: 0, isBodyweight: true },
      'barbell-rows':     { name: 'Barbell Rows',           sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 135 },
      'lat-pulldown-back':{ name: 'Lat Pulldown',           sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 120 },
      'face-pulls':       { name: 'Face Pulls',             sets: 3, repsLow: 12, repsHigh: 15, inc: 5,  startWeight: 40 },
      'bicep-curls':      { name: 'Dumbbell Bicep Curls',   sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 25 },
    };

    const DAY_TEMPLATES = {
      chest:    { id: 'chest',    name: 'Chest Day',     mainLift: 'bench',    mainName: 'Bench Press',          isVolume: false, accessories: ['incline-db', 'close-grip', 'tricep-ext-tonal', 'decline-fly-tonal'] },
      // Full Body day: military press is the AMRAP-tracked main (4th 5/3/1 lift).
      // Bench BBB (5x10 at 60% bench TM) sits as a supplementary block - no
      // AMRAP, no progression decisions, just volume groove work for bench.
      fullbody: {
        id: 'fullbody', name: 'Full Body Day',
        mainLift: 'press', mainName: 'Military Press', isVolume: false,
        supplementary: { lift: 'bench', name: 'Bench Press (BBB)', pct: 0.60, deloadPct: 0.50, sets: 5, deloadSets: 3, reps: 10, deloadReps: 5 },
        accessories: ['goblet-squat', 'lat-pulldown', 'plank'],
      },
      legs:     { id: 'legs',     name: 'Leg Day',       mainLift: 'squat',    mainName: 'Back Squat',           isVolume: false, accessories: ['romanian-dl', 'leg-press', 'leg-curls', 'calf-raises', 'leg-raises'] },
      back:     { id: 'back',     name: 'Back Day',      mainLift: 'deadlift', mainName: 'Deadlift',             isVolume: false, accessories: ['pull-ups', 'barbell-rows', 'lat-pulldown-back', 'face-pulls', 'bicep-curls'] },
    };
    const DAY_ORDER = ['chest', 'fullbody', 'legs', 'back'];

    // ============================================================
    // SESSION BUILDING
    // ============================================================
    const buildMainSets = (tm, week, isVolume) => {
      // isVolume legacy path kept in case any day still flags volume (none do
      // post-promotion of military press as Full Body main). Treat as 5/3/1.
      return WEEK_SCHEMES[week].sets.map((s, i) => ({
        id: `main-${i}`, weight: round5(tm * s.pct), targetReps: s.reps,
        isAmrap: s.isAmrap, minReps: s.minReps, completed: false, actualReps: null
      }));
    };

    const buildAccessory = (id, log) => {
      const def = ACCESSORIES[id];
      const last = log[id] || { weight: def.startWeight, hitTopOnAllSets: false, bumpMult: 1 };
      const bumpMult = last.bumpMult || 1;
      const bumpAmount = last.hitTopOnAllSets ? def.inc * bumpMult : 0;
      const suggested = last.weight + bumpAmount;
      return {
        id, name: def.name, sets: def.sets, repsLow: def.repsLow, repsHigh: def.repsHigh, inc: def.inc,
        isTimed: def.isTimed, isBodyweight: def.isBodyweight,
        weight: suggested, lastWeight: last.weight,
        progressionHint: bumpAmount > 0 ? `+${bumpAmount} lb from last time` : null,
        setData: Array.from({ length: def.sets }, (_, i) => ({ id: `${id}-${i}`, reps: null, completed: false })),
      };
    };

    const buildSupplementary = (sup, state) => {
      if (!sup) return null;
      const isDeload = state.week === 4;
      const pct = isDeload ? (sup.deloadPct ?? sup.pct) : sup.pct;
      const count = isDeload ? (sup.deloadSets ?? sup.sets) : sup.sets;
      const reps = isDeload ? (sup.deloadReps ?? sup.reps) : sup.reps;
      const supTm = state.trainingMaxes[sup.lift];
      const w = round5(supTm * pct);
      return {
        lift: sup.lift,
        name: sup.name,
        sets: Array.from({ length: count }, (_, i) => ({
          id: `sup-${i}`, weight: w, targetReps: reps, isAmrap: false, completed: false, actualReps: null,
        })),
      };
    };

    const buildSession = (dayId, state) => {
      const tpl = DAY_TEMPLATES[dayId];
      const tm = state.trainingMaxes[tpl.mainLift];
      return {
        dayId, name: tpl.name, cycle: state.cycle, week: state.week,
        weekLabel: WEEK_SCHEMES[state.week].label,
        mainLift: tpl.mainLift, mainName: tpl.mainName, isVolume: tpl.isVolume,
        mainSets: buildMainSets(tm, state.week, tpl.isVolume),
        supplementary: buildSupplementary(tpl.supplementary, state),
        accessories: tpl.accessories.map(id => buildAccessory(id, state.accessoryLog)),
      };
    };

    // ============================================================
    // PROGRESSION
    // ============================================================
    const finishSession = (state, completed) => {
      const newLog = { ...state.accessoryLog };
      completed.accessories.forEach(acc => {
        const def = ACCESSORIES[acc.id];
        const reps = acc.setData.map(s => s.reps).filter(r => r != null);
        const hitTop = reps.length === acc.sets && reps.every(r => r >= def.repsHigh);
        // Smart accessory bump: if MIN reps across all sets blew past the top
        // of the range, the weight is way too light. Scale next session's bump.
        const minReps = reps.length ? Math.min(...reps) : 0;
        const overshoot = hitTop ? minReps - def.repsHigh : 0;
        let bumpMult = 1;
        if (overshoot >= 5) bumpMult = 3;        // monster overshoot
        else if (overshoot >= 3) bumpMult = 2;   // strong overshoot
        newLog[acc.id] = { weight: acc.weight, hitTopOnAllSets: hitTop, lastReps: reps, bumpMult };
      });
      const done = { ...state.completedThisWeek, [completed.dayId]: true };
      let { cycle, week, trainingMaxes } = state;
      let newDone = done;
      let cycleAdvanced = false;
      let smartBumped = null; // { lift, fromTM, toTM } if a mid-cycle smart bump fired

      // Smart bump: if AMRAP crushed target by +3 reps or more on a non-volume
      // session, bump that lift's TM mid-cycle instead of waiting for end of
      // cycle. Catches fast progressors whose TM is too conservative.
      if (!completed.isVolume) {
        const amrap = (completed.mainSets || []).find((s) => s.isAmrap && s.actualReps != null);
        if (amrap && amrap.actualReps >= amrap.targetReps + 3) {
          const lift = completed.mainLift;
          // Upper body lifts (bench, press) bump by 5; lower body (squat, dl) by 10.
          const bump = (lift === 'bench' || lift === 'press') ? 5 : 10;
          const fromTM = trainingMaxes[lift];
          trainingMaxes = { ...trainingMaxes, [lift]: fromTM + bump };
          smartBumped = { lift, fromTM, toTM: fromTM + bump, repsOverTarget: amrap.actualReps - amrap.targetReps };
        }
      }

      if (Object.values(done).every(v => v)) {
        newDone = { chest: false, fullbody: false, legs: false, back: false };
        if (week === 4) {
          week = 1; cycle += 1; cycleAdvanced = true;
          trainingMaxes = { bench: trainingMaxes.bench + 5, squat: trainingMaxes.squat + 10, deadlift: trainingMaxes.deadlift + 10, press: (trainingMaxes.press || 85) + 5 };
        } else week += 1;
      }
      const newHistory = [{ ...completed, completedAt: new Date().toISOString(), smartBumped }, ...(state.history || [])].slice(0, 200);
      const tmHistory = appendTMHistory(state.trainingMaxesHistory, trainingMaxes, smartBumped ? 'smart-bump' : (cycleAdvanced ? 'cycle-end' : 'unchanged'));
      return { ...state, cycle, week, trainingMaxes, accessoryLog: newLog, completedThisWeek: newDone, history: newHistory, activeSession: null, trainingMaxesHistory: tmHistory, _lastSmartBump: smartBumped };
    };

    const estimate1RM = (w, r) => (!w || !r) ? null : Math.round(w * (1 + r / 30));

    // Build a coaching summary diffing pre/post state for a completed session.
    // Used by SessionCompleteView.
    const buildSessionSummary = (prevState, nextState, completed) => {
      const lift = completed.mainLift;
      const amrap = (completed.mainSets || []).find((s) => s.isAmrap && s.actualReps);

      // Best e1RM across non-AMRAP completed sets too (lets us show a
      // PR-week top set that beat the AMRAP, for example). Volume days are
      // skipped entirely - the weights are sub-maximal by design (60% of TM)
      // so any e1RM would be falsely low and overwrite accurate data.
      let sessionBestE1RM = null, sessionBestSet = null;
      if (!completed.isVolume) {
        (completed.mainSets || []).forEach((set) => {
          if (!set.completed || !set.weight) return;
          const reps = set.isAmrap ? set.actualReps : set.targetReps;
          if (!reps) return;
          const e = estimate1RM(set.weight, reps);
          if (e && (sessionBestE1RM == null || e > sessionBestE1RM)) {
            sessionBestE1RM = e;
            sessionBestSet = set;
          }
        });
      }

      // AMRAP-derived (only when AMRAP set exists). Distinct so we still show
      // the AMRAP card prominently when present.
      const amrapE1RM = amrap ? estimate1RM(amrap.weight, amrap.actualReps) : null;
      const newE1RM = sessionBestE1RM ?? amrapE1RM;
      const prevBestE1RM = getBestE1RM(prevState.history, lift);
      const isPR = newE1RM != null && (prevBestE1RM == null || newE1RM > prevBestE1RM);
      const e1RMDelta = newE1RM != null && prevBestE1RM != null ? newE1RM - prevBestE1RM : null;

      const bs = nextState.bodyStats || {};
      const standards = adjustedStandards(lift, bs.weight, bs.age);
      const newPct = newE1RM != null && standards ? computePercentile(newE1RM, standards) : null;
      const prevPct = prevBestE1RM != null && standards ? computePercentile(prevBestE1RM, standards) : null;
      const newBand = newPct != null ? percentileLabel(newPct) : null;
      const prevBand = prevPct != null ? percentileLabel(prevPct) : null;
      const bandJumped = newBand && prevBand && newBand !== prevBand;

      let intensityHint = null;
      if (amrap && amrap.targetReps != null) {
        const overshoot = amrap.actualReps - amrap.targetReps;
        // Note: when overshoot >= 3, finishSession will smart-bump the TM
        // immediately. The smart-bump card in the UI tells that story; hint
        // here just covers the moderate / on-target / under cases.
        if (overshoot >= 3) intensityHint = null; // covered by SMART-BUMP card
        else if (overshoot >= 2) intensityHint = `Strong AMRAP — ${overshoot} above target. On track to bump TM at end of cycle.`;
        else if (overshoot < 0) intensityHint = `Below AMRAP target. If this happens twice in a row, drop TM 5-10 lb and rebuild.`;
        else intensityHint = `Right at target. TM is well-calibrated.`;
      }

      const completedMain = (completed.mainSets || []).filter((s) => s.completed);
      const mainVolume = completedMain.reduce((sum, s) => sum + (s.weight || 0) * (s.actualReps ?? s.targetReps ?? 0), 0);
      const accVolume = (completed.accessories || []).reduce((sum, a) => {
        if (a.isBodyweight || a.isTimed) return sum;
        return sum + (a.setData || []).reduce((ss, x) => ss + (a.weight || 0) * (x.reps || 0), 0);
      }, 0);
      const totalVolume = Math.round(mainVolume + accVolume);
      const setsCompleted = completedMain.length + (completed.accessories || []).reduce((s, a) => s + (a.setData || []).filter((x) => x.completed).length, 0);

      const accessoryNotes = (completed.accessories || []).map((acc) => {
        const log = (nextState.accessoryLog || {})[acc.id];
        const def = ACCESSORIES[acc.id];
        const hitTop = !!(log && log.hitTopOnAllSets);
        const bumpMult = (log && log.bumpMult) || 1;
        const baseInc = def ? def.inc : 0;
        const inc = hitTop ? baseInc * bumpMult : 0;
        return {
          id: acc.id, name: acc.name,
          weight: acc.weight,
          isBodyweight: acc.isBodyweight,
          isTimed: acc.isTimed,
          hitTop,
          inc,
          bumpMult,
          setsLogged: (acc.setData || []).filter((x) => x.completed).length,
          setsTotal: (acc.setData || []).length,
        };
      });

      const tmBumped = !!(prevState.trainingMaxes && nextState.trainingMaxes && (
        prevState.trainingMaxes.bench !== nextState.trainingMaxes.bench ||
        prevState.trainingMaxes.squat !== nextState.trainingMaxes.squat ||
        prevState.trainingMaxes.deadlift !== nextState.trainingMaxes.deadlift
      ));

      const cycleAdvanced = prevState.cycle !== nextState.cycle;
      const weekAdvanced = prevState.week !== nextState.week;

      // Next session preview from the NEW state (post-bump).
      const nextDayId = DAY_ORDER.find((d) => !(nextState.completedThisWeek || {})[d]);
      let nextPreview = null;
      if (nextDayId) {
        const tpl = DAY_TEMPLATES[nextDayId];
        const tm = nextState.trainingMaxes[tpl.mainLift];
        nextPreview = {
          dayId: nextDayId,
          name: tpl.name,
          mainName: tpl.mainName,
          weekLabel: WEEK_SCHEMES[nextState.week].label,
          firstMainWeight: round5(tm * (tpl.isVolume ? 0.6 : (WEEK_SCHEMES[nextState.week].sets[0].pct || 0.65))),
          isVolume: tpl.isVolume,
        };
      }

      // Recovery context if Oura has fresh data.
      const oura = nextState.oura;
      const ouraNote = oura && oura.last_sync_at && (Date.now() - oura.last_sync_at < 36 * 3600_000)
        ? { sleep: oura.sleep_score_yesterday, readiness: oura.readiness_score_today }
        : null;

      return {
        sessionName: completed.name,
        cycle: completed.cycle,
        week: completed.week,
        weekLabel: completed.weekLabel,
        mainLift: lift, mainName: completed.mainName,
        isVolume: completed.isVolume,
        amrap,
        sessionBestE1RM, sessionBestSet, amrapE1RM,
        newE1RM, prevBestE1RM, e1RMDelta, isPR,
        newPct, prevPct, newBand, prevBand, bandJumped,
        intensityHint,
        totalVolume, setsCompleted,
        accessoryNotes,
        tmBumped, prevTMs: prevState.trainingMaxes, newTMs: nextState.trainingMaxes,
        smartBumped: nextState._lastSmartBump || null,
        cycleAdvanced, weekAdvanced,
        newCycle: nextState.cycle, newWeek: nextState.week,
        nextPreview,
        ouraNote,
      };
    };

    // ============================================================
    // STRENGTH PERCENTILES (age + bodyweight adjusted)
    // ============================================================
    // Reference 1RM at 185 lb body weight, age 25-30, male.
    // Values picked at 5th / 25th / 50th / 75th / 95th percentile bands
    // (Beginner / Novice / Intermediate / Advanced / Elite).
    const STRENGTH_REF = {
      bench:    [155, 200, 245, 295, 355],
      squat:    [195, 250, 305, 365, 430],
      deadlift: [240, 300, 365, 435, 510],
      press:    [ 75, 105, 140, 175, 215],
    };
    const STRENGTH_PCT = [5, 25, 50, 75, 95];
    const STRENGTH_BANDS = ['Beginner', 'Novice', 'Intermediate', 'Advanced', 'Elite'];

    // Age-adjustment: 1.0 at 30y, drops ~5.3% per decade. Mirrors common
    // strength-standard age coefficients.
    const ageFactor = (age) => Math.max(0.5, 1.0 - Math.max(0, (age || 30) - 30) * 0.0053);
    // Bodyweight sublinear scaling (heavier = lift more absolute but less per kg).
    const bwFactor = (bw) => Math.pow((bw || 185) / 185, 0.65);

    const adjustedStandards = (lift, bw, age) => {
      const ref = STRENGTH_REF[lift];
      if (!ref) return null;
      const scale = ageFactor(age) * bwFactor(bw);
      return ref.map((v) => Math.round(v * scale));
    };

    const computePercentile = (value, standards) => {
      if (!value || !standards) return null;
      if (value <= standards[0]) {
        return Math.max(1, Math.round((value / standards[0]) * STRENGTH_PCT[0]));
      }
      for (let i = 0; i < standards.length - 1; i++) {
        if (value <= standards[i + 1]) {
          const frac = (value - standards[i]) / (standards[i + 1] - standards[i]);
          return Math.round(STRENGTH_PCT[i] + frac * (STRENGTH_PCT[i + 1] - STRENGTH_PCT[i]));
        }
      }
      const last = standards[standards.length - 1];
      const overshoot = (value - last) / (last * 0.15);
      return Math.min(99, 95 + Math.round(overshoot * 4));
    };

    const percentileLabel = (p) => {
      if (p == null) return null;
      if (p >= 95) return 'Elite';
      if (p >= 75) return 'Advanced';
      if (p >= 50) return 'Intermediate';
      if (p >= 25) return 'Novice';
      return 'Beginner';
    };

    const nextMilestone = (value, standards) => {
      if (!value || !standards) return null;
      for (let i = 0; i < standards.length; i++) {
        if (standards[i] > value) {
          return { value: standards[i], pct: STRENGTH_PCT[i], label: STRENGTH_BANDS[i] };
        }
      }
      return null;
    };

    // Map main lift to the muscle-group label users feel naturally.
    // The percentile shown is from the main lift (the universally accepted
    // strength indicator for that group); no peer-group data exists for
    // most accessories so we don't attempt a composite.
    const MUSCLE_GROUP_LABEL = {
      bench:    'Upper body strength',
      squat:    'Leg strength',
      deadlift: 'Back & posterior strength',
    };

    // Overall strength percentile = simple mean of the three main-lift percentiles.
    // Uses e1RM when available, else TM as a 1RM proxy.
    const overallStrengthPercentile = (state) => {
      const bs = state.bodyStats || {};
      const lifts = ['bench', 'squat', 'deadlift', 'press'];
      const pcts = lifts.map((lift) => {
        const e1RM = getBestE1RM(state.history, lift) || (state.trainingMaxes || {})[lift];
        if (!e1RM) return null;
        const standards = adjustedStandards(lift, bs.weight, bs.age);
        if (!standards) return null;
        return computePercentile(e1RM, standards);
      }).filter((p) => p != null);
      if (pcts.length === 0) return null;
      return Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length);
    };

    const getBestE1RM = (history, lift) => {
      if (!history) return null;
      let best = 0;
      history.forEach(s => {
        if (s.mainLift !== lift || s.isVolume) return;
        s.mainSets?.forEach(set => {
          if (set.isAmrap && set.actualReps && set.weight) {
            const e = estimate1RM(set.weight, set.actualReps);
            if (e > best) best = e;
          }
        });
      });
      return best || null;
    };

    // ============================================================
    // STORAGE (localStorage)
    // ============================================================
    const STORAGE_KEY = 'iron-log:v2';
    const SECRET_KEY = 'iron-log:syncSecret';
    // Default snack preferences seeded into state.snackPreferences on first load.
    // Forks should replace this with their own. Used by /api/topoff to ground
    // suggestions in the snacks the user actually keeps at home.
    const DEFAULT_SNACK_PREFERENCES = `Late-evening grab-and-go snacks I keep in the house. Never cook — only ready-to-eat:

PROTEIN STARS (use to close the protein gap):
- Cottage cheese (~25g protein per cup, casein-rich — perfect for overnight)
- Greek yogurt (~20g per cup, similar role to cottage cheese)
- Beef jerky (~10-15g per oz, shelf-stable)
- Pure Protein pre-mixed shake (30g protein, 140 cal — kept in fridge)

CARB / FLEX:
- Berries (low cal, pairs with cottage cheese or yogurt)
- Popcorn (low protein but fits flex carb budget)

TREATS (fit only if cal/fat budget allows after protein is hit):
- Cashew nuts (small portion — 30g = 5g protein for 170 cal, calorie-dense)
- Pistachio nuts (similar — 30g = 6g protein for 160 cal)
- Dark chocolate (~150 cal for a square or two, no real protein)

Context: I'll have already had ~60g whey from 2 daytime Pure Protein shakes. Bias toward casein-rich options (cottage cheese, Greek yogurt) for evening rather than a 3rd whey shake. Cooking = nope.`;

    const defaultBodyStats = {
      weight: 185, bodyFatPct: 18, goalBodyFatPct: 15,
      height: 71, age: 45, sex: 'male', activityLevel: 'active',
      lastUpdated: null,
    };
    const defaultState = {
      // Calibrated 2026-05: bench 1RM 225, squat 155x5 (~181 e1RM), DL 165x10 hex (~220 e1RM),
      // press 95x8 (~120 e1RM -> TM 105 at 90% of 1RM).
      trainingMaxes: { bench: 200, squat: 165, deadlift: 200, press: 105 },
      cycle: 1, week: 1,
      completedThisWeek: { chest: false, fullbody: false, legs: false, back: false },
      accessoryLog: {}, history: [], activeSession: null,
      shareToken: null,
      bodyStats: defaultBodyStats,
      bodyStatsHistory: [], // [{ date, weight, bodyFatPct, source }]
      trainingMaxesHistory: [], // [{ date, bench, squat, deadlift, source }]
      mealsByDate: {}, // 'YYYY-MM-DD': [{ id, name, items, kcal, protein, carbs, fat, source, loggedAt }]
      oura: null, // see oura/sync.js response shape
      snackPreferences: DEFAULT_SNACK_PREFERENCES, // free text: foods user likes / avoids, used by /api/topoff
    };

    // Append a new TM snapshot only if it differs from the most recent one.
    const appendTMHistory = (history, tms, source = 'auto') => {
      const last = (history || [])[0];
      if (last && last.bench === tms.bench && last.squat === tms.squat && last.deadlift === tms.deadlift) return history || [];
      return [{ date: new Date().toISOString(), ...tms, source }, ...(history || [])].slice(0, 500);
    };

    // ============================================================
    // DIET / MACRO TARGETS
    // ============================================================
    const ACTIVITY_MULTIPLIERS = {
      sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, very_active: 1.9,
    };
    const ACTIVITY_LABELS = {
      sedentary: 'Sedentary', light: 'Light', moderate: 'Moderate', active: 'Active', very_active: 'Very Active',
    };

    // Katch-McArdle if BF% known, else Mifflin-St Jeor. Then activity-adjusted, then
    // shifted by ±300/±200 cal based on current vs goal BF.
    // If Oura's 7-day total_burn average is available and recent, it replaces the
    // BMR × activity-multiplier TDEE entirely (more accurate than a hardcoded factor).
    const computeMacroTargets = (bs, oura = null, pace = null) => {
      const stats = { ...defaultBodyStats, ...bs };
      const weightKg = stats.weight * 0.4536;
      const heightCm = stats.height * 2.54;
      let bmr;
      if (stats.bodyFatPct && stats.bodyFatPct > 3 && stats.bodyFatPct < 60) {
        const leanKg = weightKg * (1 - stats.bodyFatPct / 100);
        bmr = 370 + 21.6 * leanKg;
      } else {
        bmr = 10 * weightKg + 6.25 * heightCm - 5 * stats.age + (stats.sex === 'female' ? -161 : 5);
      }
      const ouraTdee = oura && oura.total_burn_7d_avg && oura.last_sync_at
        && (Date.now() - oura.last_sync_at < 8 * 86_400_000)
        ? oura.total_burn_7d_avg : null;
      const tdee = ouraTdee != null ? ouraTdee : bmr * (ACTIVITY_MULTIPLIERS[stats.activityLevel] || 1.55);
      const bfDelta = (stats.bodyFatPct || 18) - (stats.goalBodyFatPct || 15);
      let baseKcal, proteinPerLb, mode;
      if (bfDelta > 1) { baseKcal = tdee - 300; proteinPerLb = 1.15; mode = 'cut'; }
      else if (bfDelta < -1) { baseKcal = tdee + 200; proteinPerLb = 1.0; mode = 'bulk'; }
      else { baseKcal = tdee; proteinPerLb = 1.05; mode = 'maintain'; }
      const protein = Math.round(stats.weight * proteinPerLb);
      const fat = Math.round(stats.weight * 0.4);

      // Pace adjustment: if you've been off your goal cal balance the last few
      // days, today's target nudges to pull the rolling average back. Spread
      // the catch-up over 3 days and cap at ±400 cal so things stay sane.
      let adjustment = 0;
      if (pace && pace.hasEnoughData) {
        const targetDailyDelta = baseKcal - tdee; // negative when cutting
        const excess = pace.actualDailyDelta - targetDailyDelta;
        adjustment = Math.max(-400, Math.min(400, Math.round(-excess / 3)));
      }

      const kcal = Math.round(baseKcal + adjustment);
      const carbCal = Math.max(0, kcal - protein * 4 - fat * 9);
      const carbs = Math.round(carbCal / 4);
      return {
        kcal, baseKcal: Math.round(baseKcal), adjustment,
        protein, fat, carbs,
        maintenance: Math.round(tdee), bmr: Math.round(bmr), mode,
        tdeeSource: ouraTdee != null ? 'oura' : 'estimate',
      };
    };

    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const dateKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

    // Trailing 7-day calibration: how much we've actually eaten vs burned, vs goal.
    // Excludes today (data is incomplete). Burn comes from Oura's per-day total_cal
    // when available, else falls back to BMR x activity multiplier as an estimate.
    const computeWeeklyPace = (state) => {
      const today = new Date();
      const ouraDays = (state.oura && state.oura.days) || [];
      const burnByDate = new Map();
      ouraDays.forEach((d) => { if (d && d.total_cal != null) burnByDate.set(d.date, d.total_cal); });

      // Fallback per-day burn if Oura missing: BMR * multiplier (constant).
      const baseTargets = computeMacroTargets(state.bodyStats);
      const fallbackBurn = baseTargets.maintenance;

      const perDay = [];
      let intakeSum = 0, burnSum = 0, days = 0;
      for (let i = 1; i <= 7; i++) {
        const d = new Date(today); d.setDate(today.getDate() - i);
        const k = dateKey(d);
        const meals = (state.mealsByDate && state.mealsByDate[k]) || [];
        const intake = meals.reduce((s, m) => s + (m.kcal || 0), 0);
        if (intake > 0) {
          const burn = burnByDate.has(k) ? burnByDate.get(k) : fallbackBurn;
          intakeSum += intake;
          burnSum += burn;
          days++;
        }
        perDay.push({ date: k, intake, burn: burnByDate.get(k) || null });
      }
      if (days < 3) {
        return { hasEnoughData: false, daysCounted: days };
      }
      return {
        hasEnoughData: true,
        daysCounted: days,
        avgIntake: Math.round(intakeSum / days),
        avgBurn: Math.round(burnSum / days),
        actualDailyDelta: Math.round((intakeSum - burnSum) / days),
        perDay,
      };
    };

    // Cumulative + per-day calorie balance (intake - burn). Last 7 full days,
    // yesterday in isolation, and today-so-far prorated by time of day so the
    // in-progress number is meaningful (you haven't burned a full day's TDEE
    // by lunchtime).
    const computeCalorieBalance = (state) => {
      const today = new Date();
      const ouraDays = (state.oura && state.oura.days) || [];
      const burnByDate = new Map();
      ouraDays.forEach((d) => { if (d && d.total_cal != null) burnByDate.set(d.date, d.total_cal); });
      const fallbackTdee = computeMacroTargets(state.bodyStats, state.oura, null).maintenance;

      // 7 full prior days (exclude today)
      let cumIntake = 0, cumBurn = 0, daysWithData = 0;
      const yesterdayKey = dateKey(new Date(today.getTime() - 86_400_000));
      let yIntake = null, yBurn = null;
      for (let i = 1; i <= 7; i++) {
        const d = new Date(today); d.setDate(today.getDate() - i);
        const k = dateKey(d);
        const meals = (state.mealsByDate && state.mealsByDate[k]) || [];
        const intake = meals.reduce((s, m) => s + (m.kcal || 0), 0);
        const burn = burnByDate.has(k) ? burnByDate.get(k) : fallbackTdee;
        // Only count days where meals were actually logged (>= 1000 cal).
        // Otherwise an un-logged day reads as "ate 0 cal vs full day burn"
        // and the cumulative becomes nonsense (huge fake deficits).
        if (intake >= 1000) {
          cumIntake += intake;
          cumBurn += burn;
          daysWithData++;
        }
        if (k === yesterdayKey) {
          yIntake = intake;
          yBurn = burnByDate.has(k) ? burnByDate.get(k) : fallbackTdee;
        }
      }

      // Today so far: prorate burn by time-of-day fraction (more honest than
      // comparing partial intake to a full-day burn estimate).
      const tKey = dateKey(today);
      const todayMeals = (state.mealsByDate && state.mealsByDate[tKey]) || [];
      const todayIntake = todayMeals.reduce((s, m) => s + (m.kcal || 0), 0);
      const fractionOfDay = (today.getHours() * 60 + today.getMinutes()) / (24 * 60);
      // If Oura has a (partial) total_cal for today, prefer that. Otherwise
      // estimate today's burn so far as fractionOfDay * average daily burn.
      const ouraToday = state.oura && state.oura.total_burn_today;
      const todayBurnSoFar = ouraToday != null ? ouraToday : Math.round(fallbackTdee * fractionOfDay);

      return {
        cumulative: {
          intake: cumIntake, burn: cumBurn, net: cumIntake - cumBurn, days: daysWithData,
        },
        yesterday: {
          date: yesterdayKey,
          intake: yIntake, burn: yBurn,
          net: yIntake != null && yBurn != null ? yIntake - yBurn : null,
          hasIntake: yIntake != null && yIntake > 0,
        },
        today: {
          intake: todayIntake, burn: todayBurnSoFar,
          net: todayIntake - todayBurnSoFar,
          fractionOfDay,
          fromOura: ouraToday != null,
        },
      };
    };

    const sumMeals = (meals) => {
      const t = { kcal: 0, protein: 0, carbs: 0, fat: 0 };
      (meals || []).forEach(m => {
        t.kcal += m.kcal || 0;
        t.protein += m.protein || 0;
        t.carbs += m.carbs || 0;
        t.fat += m.fat || 0;
      });
      return t;
    };

    const fileToBase64 = (file) => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => {
        const s = r.result;
        const comma = s.indexOf(',');
        res({ data: s.slice(comma + 1), mediaType: file.type || 'image/jpeg' });
      };
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const analyzeMealPhoto = async (file) => {
      const { data, mediaType } = await fileToBase64(file);
      return callMealAPI({ imageBase64: data, mediaType });
    };

    const analyzeMealText = async (description) => {
      if (!description || !description.trim()) throw new Error('Description required');
      return callMealAPI({ description: description.trim() });
    };

    const callMealAPI = async (body) => {
      const secret = cloudSync.getSecret();
      const r = await fetch('/api/meal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...(secret ? { 'x-sync-secret': secret } : {}) },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        throw new Error(j.error || `HTTP ${r.status}`);
      }
      return r.json();
    };
    const loadState = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          const tm = parsed.trainingMaxes;
          if (tm && tm.bench === 230 && tm.squat === 250 && tm.deadlift === 295) {
            parsed.trainingMaxes = { bench: 200, squat: 165, deadlift: 200 };
          }
          // Backfill press TM for users on the schema before press became a 4th main lift.
          // Also one-time bump: if press is exactly 85 (the initial conservative default
          // shipped briefly), upgrade to 105 to match the user's actual 95x8 starting set.
          if (parsed.trainingMaxes && parsed.trainingMaxes.press == null) {
            parsed.trainingMaxes = { ...parsed.trainingMaxes, press: 105 };
          } else if (parsed.trainingMaxes && parsed.trainingMaxes.press === 85) {
            parsed.trainingMaxes = { ...parsed.trainingMaxes, press: 105 };
          }
          const tms = parsed.trainingMaxes || defaultState.trainingMaxes;
          const tmHistory = (parsed.trainingMaxesHistory && parsed.trainingMaxesHistory.length > 0)
            ? parsed.trainingMaxesHistory
            : [{ date: new Date().toISOString(), ...tms, source: 'initial' }];
          return {
            ...defaultState,
            ...parsed,
            bodyStats: { ...defaultBodyStats, ...(parsed.bodyStats || {}) },
            mealsByDate: parsed.mealsByDate || {},
            bodyStatsHistory: parsed.bodyStatsHistory || [],
            trainingMaxesHistory: tmHistory,
            oura: parsed.oura || null,
            // Empty string falls back to the seeded default so first-time
            // users (and existing users with an empty value) get something
            // useful in the Top Off suggester.
            snackPreferences: (parsed.snackPreferences && parsed.snackPreferences.trim()) ? parsed.snackPreferences : DEFAULT_SNACK_PREFERENCES,
          };
        }
      } catch (e) {}
      return defaultState;
    };
    const saveState = (s) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.error(e); }
    };

    // ============================================================
    // CLOUD SYNC (Vercel KV via /api/state)
    // ============================================================
    const cloudSync = (() => {
      let saveTimer = null;
      let lastSavedJson = '';
      let listener = null;

      const getSecret = () => {
        try { return localStorage.getItem(SECRET_KEY) || null; } catch { return null; }
      };
      const setSecret = (s) => {
        try {
          if (s) localStorage.setItem(SECRET_KEY, s);
          else localStorage.removeItem(SECRET_KEY);
          lastSavedJson = '';
        } catch (e) { console.error(e); }
      };

      const pull = async () => {
        const secret = getSecret();
        if (!secret) return { state: null, status: 'off' };
        try {
          const r = await fetch('/api/state', { headers: { 'x-sync-secret': secret }, cache: 'no-store' });
          if (r.status === 401) return { state: null, status: 'unauthorized' };
          if (!r.ok) return { state: null, status: 'error' };
          const data = await r.json();
          return { state: data.state, status: 'ok' };
        } catch {
          return { state: null, status: 'error' };
        }
      };

      const push = async (state) => {
        const secret = getSecret();
        if (!secret) return 'off';
        const payload = JSON.stringify(state);
        try {
          const r = await fetch('/api/state', {
            method: 'POST',
            headers: { 'x-sync-secret': secret, 'Content-Type': 'application/json' },
            body: payload,
          });
          if (r.status === 401) return 'unauthorized';
          if (!r.ok) return 'error';
          lastSavedJson = payload;
          return 'synced';
        } catch {
          return 'error';
        }
      };

      const scheduleSave = (state) => {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          const secret = getSecret();
          if (!secret) { listener && listener('off'); return; }
          const payload = JSON.stringify(state);
          if (payload === lastSavedJson) { listener && listener('synced'); return; }
          listener && listener('syncing');
          const status = await push(state);
          listener && listener(status);
        }, 1500);
      };

      const onStatus = (fn) => { listener = fn; };

      return { getSecret, setSecret, pull, push, scheduleSave, onStatus };
    })();

    // Cryptographically random URL-safe token, ~22 chars.
    const genShareToken = () => {
      const bytes = new Uint8Array(16);
      (window.crypto || window.msCrypto).getRandomValues(bytes);
      return btoa(String.fromCharCode(...bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    };

    // ============================================================
    // SHARED REP PROMPT MODAL
    // ============================================================
    const RepPrompt = ({ open, title, subtitle, defaultValue, onCancel, onSubmit }) => {
      const [val, setVal] = useState(defaultValue?.toString() ?? '');
      useEffect(() => { if (open) setVal(defaultValue?.toString() ?? ''); }, [open, defaultValue]);
      if (!open) return null;
      const submit = () => {
        const n = parseInt(val, 10);
        if (!isNaN(n) && n >= 0) onSubmit(n);
      };
      return (
        <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-6" onClick={onCancel}>
          <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-6 w-full max-w-sm" onClick={(e) => e.stopPropagation()}>
            <div className="text-xs uppercase tracking-widest text-orange-400 font-semibold mb-2">{title}</div>
            <div className="text-sm text-neutral-400 mb-4">{subtitle}</div>
            <input type="number" autoFocus inputMode="numeric" value={val}
              onChange={(e) => setVal(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && submit()}
              className="w-full bg-neutral-900 border-2 border-neutral-800 focus:border-orange-500 rounded-lg px-4 py-4 text-4xl font-mono font-bold text-center text-neutral-50 outline-none"
              placeholder="0" />
            <div className="flex gap-2 mt-4">
              <button onClick={onCancel} className="flex-1 py-3 rounded-lg border border-neutral-800 text-neutral-400 uppercase tracking-wider text-sm font-semibold hover:bg-neutral-900">Cancel</button>
              <button onClick={submit} className="flex-1 py-3 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-sm font-bold hover:bg-orange-400">Log</button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // MAIN SET ROW
    // ============================================================
    const MainSetRow = ({ set, idx, onToggle, onAmrap }) => {
      const [showPrompt, setShowPrompt] = useState(false);
      const handleClick = () => {
        if (set.isAmrap && !set.completed) setShowPrompt(true);
        else onToggle();
      };
      return (
        <>
          <div
            className={`flex items-center justify-between px-4 py-4 rounded-lg border transition-all cursor-pointer select-none ${
              set.completed ? 'bg-orange-500/10 border-orange-500/40' : 'bg-neutral-900 border-neutral-800 hover:border-neutral-700 active:scale-[0.99]'
            }`}
            onClick={handleClick}>
            <div className="flex items-center gap-4">
              <div className={`w-9 h-9 rounded-full border-2 flex items-center justify-center font-mono text-sm shrink-0 ${
                set.completed ? 'bg-orange-500 border-orange-500 text-black' : 'border-neutral-700 text-neutral-500'
              }`}>
                {set.completed ? <Check size={16} strokeWidth={3} /> : idx + 1}
              </div>
              <div>
                <div className="font-mono text-2xl font-bold text-neutral-50 leading-none">
                  {set.weight}<span className="text-neutral-500 text-base font-normal ml-1">lb</span>
                </div>
                <div className="text-xs uppercase tracking-wider text-neutral-500 mt-1">
                  {set.isAmrap
                    ? set.completed ? `${set.actualReps} reps logged` : `${set.targetReps}+ reps · tap to log`
                    : `${set.targetReps} reps`}
                </div>
              </div>
            </div>
            {set.isAmrap && !set.completed && (
              <div className="text-xs uppercase tracking-wider text-orange-400 font-semibold flex items-center gap-1">
                <Flame size={14} /> AMRAP
              </div>
            )}
          </div>
          <RepPrompt open={showPrompt} title="AMRAP Set"
            subtitle={`${set.weight} lb · target ${set.targetReps}+ reps`}
            defaultValue={set.targetReps}
            onCancel={() => setShowPrompt(false)}
            onSubmit={(n) => { onAmrap(n); setShowPrompt(false); }} />
        </>
      );
    };

    // ============================================================
    // ACCESSORY CARD
    // ============================================================
    const AccessoryCard = ({ ex, onUpdate }) => {
      const [promptIdx, setPromptIdx] = useState(null);

      const adjustWeight = (d) => {
        if (ex.isBodyweight) return;
        onUpdate({ ...ex, weight: Math.max(0, ex.weight + d) });
      };
      const logSet = (idx, reps) => {
        const setData = ex.setData.map((s, i) => i === idx ? { ...s, reps, completed: true } : s);
        onUpdate({ ...ex, setData });
        setPromptIdx(null);
      };
      const toggleSet = (idx) => {
        const set = ex.setData[idx];
        if (set.completed) {
          const setData = ex.setData.map((s, i) => i === idx ? { ...s, reps: null, completed: false } : s);
          onUpdate({ ...ex, setData });
        } else setPromptIdx(idx);
      };

      const repLabel = ex.isTimed ? `${ex.repsLow}-${ex.repsHigh} seconds` : `${ex.repsLow}-${ex.repsHigh} reps`;

      return (
        <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-4">
          <div className="flex items-start justify-between mb-3 gap-3">
            <div className="min-w-0">
              <div className="text-base font-bold text-neutral-50 tracking-tight">{ex.name}</div>
              <div className="text-xs uppercase tracking-wider text-neutral-500 font-mono mt-0.5">
                {ex.sets} sets × {repLabel}
              </div>
            </div>
            {ex.progressionHint && (
              <div className="text-[10px] uppercase tracking-wider text-green-400 font-semibold flex items-center gap-1 bg-green-950/40 px-2 py-1 rounded shrink-0">
                <ArrowUp size={10} strokeWidth={3} /> {ex.progressionHint}
              </div>
            )}
          </div>

          {!ex.isBodyweight && !ex.isTimed && (
            <div className="flex items-center gap-2 mb-3">
              <button onClick={() => adjustWeight(-ex.inc)} className="w-10 h-12 rounded-lg bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-800 active:scale-95">
                <Minus size={16} />
              </button>
              <div className="flex-1 h-12 bg-neutral-900 border border-neutral-800 rounded-lg flex items-center justify-center">
                <span className="font-mono text-2xl font-bold text-neutral-50">{ex.weight}</span>
                <span className="text-neutral-500 text-sm font-normal ml-1">lb</span>
              </div>
              <button onClick={() => adjustWeight(ex.inc)} className="w-10 h-12 rounded-lg bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-800 active:scale-95">
                <Plus size={16} />
              </button>
            </div>
          )}
          {ex.isBodyweight && (
            <div className="mb-3 px-3 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-center text-xs uppercase tracking-wider text-neutral-400 font-mono">
              Bodyweight
            </div>
          )}

          <div className="grid grid-cols-3 gap-2">
            {ex.setData.map((set, i) => (
              <button key={set.id} onClick={() => toggleSet(i)}
                className={`py-3 rounded-lg border transition-all flex flex-col items-center justify-center gap-0.5 active:scale-[0.97] ${
                  set.completed ? 'bg-orange-500/10 border-orange-500/40 text-orange-200' : 'bg-neutral-900 border-neutral-800 text-neutral-500 hover:border-neutral-700'
                }`}>
                <div className="text-[10px] uppercase tracking-wider">Set {i + 1}</div>
                <div className="font-mono text-lg font-bold leading-none">{set.completed ? set.reps : '—'}</div>
                <div className="text-[10px] uppercase tracking-wider">{set.completed ? (ex.isTimed ? 'sec' : 'reps') : 'tap'}</div>
              </button>
            ))}
          </div>

          <RepPrompt open={promptIdx !== null}
            title={ex.isTimed ? 'Log Time' : 'Log Reps'}
            subtitle={`${ex.name} · Set ${(promptIdx ?? 0) + 1} · target ${repLabel}`}
            defaultValue={ex.repsHigh}
            onCancel={() => setPromptIdx(null)}
            onSubmit={(n) => logSet(promptIdx, n)} />
        </div>
      );
    };

    // ============================================================
    // STAT BOX
    // ============================================================
    const StatBox = ({ label, value, best }) => (
      <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-3">
        <div className="text-[10px] uppercase tracking-wider text-neutral-500 mb-1">{label}</div>
        <div className="font-mono text-xl font-bold text-neutral-50 leading-none">
          {value}<span className="text-neutral-500 text-xs ml-0.5 font-normal">lb</span>
        </div>
        {best && <div className="text-[10px] text-neutral-500 mt-1 font-mono">est 1RM: {best}</div>}
      </div>
    );

    // ============================================================
    // SPARKLINE (mini SVG line chart)
    // ============================================================
    // Tap-to-expand card. Summary always visible; detail hidden until tapped.
    // `headline` is a JSX node shown next to the chevron on the right.
    // `summary` is the always-visible left-hand block (label + key number).
    const ExpandableCard = ({ summary, headline, children, defaultExpanded = false }) => {
      const [expanded, setExpanded] = useState(defaultExpanded);
      return (
        <div className="bg-neutral-950 border border-neutral-800 rounded-xl overflow-hidden mb-4">
          <button onClick={() => setExpanded(!expanded)} className="w-full p-5 text-left flex items-center justify-between gap-3 hover:bg-neutral-900/30 active:scale-[0.995]">
            <div className="flex-1 min-w-0">{summary}</div>
            <div className="flex items-center gap-2 shrink-0">
              {headline}
              <div className="text-neutral-600">{expanded ? <ChevronDown size={18} /> : <ChevronRight size={18} />}</div>
            </div>
          </button>
          {expanded && (
            <div className="px-5 pb-5 border-t border-neutral-900 pt-4">
              {children}
            </div>
          )}
        </div>
      );
    };

    const Sparkline = ({ points, color = '#F97316', height = 56, fill = true }) => {
      if (!points || points.length < 2) {
        return <div className="text-[10px] text-neutral-600 font-mono italic" style={{ height }}>not enough data yet</div>;
      }
      const W = 240;
      const H = height;
      const values = points.map(p => p.value);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = (max - min) || 1;
      const padY = 4;
      const pts = points.map((p, i) => {
        const x = (i / (points.length - 1)) * W;
        const y = H - padY - ((p.value - min) / range) * (H - padY * 2);
        return [x, y];
      });
      const polyline = pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const polygon = `0,${H} ${polyline} ${W},${H}`;
      const gradId = `g-${color.replace('#', '')}-${points.length}`;
      const last = pts[pts.length - 1];
      return (
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="w-full" style={{ height }}>
          {fill && (
            <defs>
              <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={color} stopOpacity="0.35" />
                <stop offset="100%" stopColor={color} stopOpacity="0" />
              </linearGradient>
            </defs>
          )}
          {fill && <polygon fill={`url(#${gradId})`} points={polygon} />}
          <polyline fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" points={polyline} />
          <circle cx={last[0]} cy={last[1]} r="3" fill={color} />
        </svg>
      );
    };

    // Reduce raw history (newest first) to ordered points for the chart, filtering nulls.
    const sparkPoints = (entries, field) => {
      if (!Array.isArray(entries)) return [];
      const arr = entries
        .filter(e => e && e[field] != null && !isNaN(Number(e[field])))
        .map(e => ({
          ts: e.date ? new Date(e.date).getTime() : 0,
          value: Number(e[field]),
        }))
        .filter(p => p.ts > 0)
        .sort((a, b) => a.ts - b.ts);
      return arr;
    };

    // Find a value from ~N days ago for delta calc.
    const valueDaysAgo = (points, days) => {
      if (!points || points.length === 0) return null;
      const cutoff = Date.now() - days * 86_400_000;
      // Find the point closest to cutoff (in time), from before or at cutoff.
      let best = null;
      for (const p of points) {
        if (p.ts <= cutoff) best = p;
        else break;
      }
      return best ? best.value : points[0].value;
    };

    const formatDelta = (now, then, unit = '', precision = 1) => {
      if (now == null || then == null) return '—';
      const d = now - then;
      const sign = d > 0 ? '+' : '';
      return `${sign}${d.toFixed(precision)}${unit}`;
    };

    // ============================================================
    // BODY COMPOSITION CARD
    // ============================================================
    // ============================================================
    // BODY COMP TREND + DIAGNOSTIC
    // ============================================================
    // Returns rate-of-change over a window, plus a verdict + recommended
    // action based on whether you're losing fat / muscle / weight / nothing.
    const computeBodyTrend = (state, windowDays = 30) => {
      const hist = state.bodyStatsHistory || [];
      if (hist.length < 2) return { hasEnoughData: false, points: hist.length };

      // History is newest-first. Find a comparison point at least windowDays old,
      // falling back to the oldest entry we have.
      const newest = hist[0];
      const newestTs = new Date(newest.date).getTime();
      let baseline = hist[hist.length - 1];
      const cutoff = newestTs - windowDays * 86_400_000;
      for (const h of hist) {
        const t = new Date(h.date).getTime();
        if (t <= cutoff) { baseline = h; break; }
      }
      const baselineTs = new Date(baseline.date).getTime();
      const daysSpan = Math.max(1, (newestTs - baselineTs) / 86_400_000);
      const weeksSpan = daysSpan / 7;

      const leanLb = (w, bf) => (w != null && bf != null) ? w * (1 - bf / 100) : null;

      const wNew = newest.weight, wOld = baseline.weight;
      const bfNew = newest.bodyFatPct, bfOld = baseline.bodyFatPct;
      const lNew = leanLb(wNew, bfNew), lOld = leanLb(wOld, bfOld);

      const weightRate = (wNew - wOld) / weeksSpan;
      const bfRate = (bfNew != null && bfOld != null) ? (bfNew - bfOld) / weeksSpan : null;
      const leanRate = (lNew != null && lOld != null) ? (lNew - lOld) / weeksSpan : null;

      return {
        hasEnoughData: true,
        windowDays: Math.round(daysSpan),
        weeksSpan,
        weightNow: wNew, weightThen: wOld, weightRate,
        bfNow: bfNew, bfThen: bfOld, bfRate,
        leanNow: lNew, leanThen: lOld, leanRate,
      };
    };

    // Diagnose what's happening based on the trend signals and produce a
    // verdict + actionable next step. Tolerances are tight on purpose - the
    // measurement noise on a smart scale is real but consistent week-over-week.
    const bodyDiagnostic = (trend, bodyStats) => {
      if (!trend || !trend.hasEnoughData) {
        return { status: 'unknown', verdict: 'Need more weigh-ins to read the trend.', action: 'Sync Withings or log weigh-ins weekly. 2+ data points unlock this section.' };
      }
      const wTol = 0.15;  // lb/week
      const bfTol = 0.1;  // %/week
      const lTol  = 0.1;  // lb/week
      const wDir = trend.weightRate > wTol ? 'gain' : trend.weightRate < -wTol ? 'loss' : 'stable';
      const bfDir = trend.bfRate == null ? null : trend.bfRate > bfTol ? 'gain' : trend.bfRate < -bfTol ? 'loss' : 'stable';
      const lDir = trend.leanRate == null ? null : trend.leanRate > lTol ? 'gain' : trend.leanRate < -lTol ? 'loss' : 'stable';

      const inCutMode = (bodyStats?.bodyFatPct || 18) - (bodyStats?.goalBodyFatPct || 15) > 1;

      if (wDir === 'loss' && bfDir === 'loss' && (lDir === 'stable' || lDir === 'gain')) {
        return { status: 'good', verdict: 'Healthy fat loss — maintaining muscle.', action: 'Stay the course. Hit protein 215g+ daily.' };
      }
      if (wDir === 'loss' && lDir === 'loss') {
        return { status: 'warn', verdict: 'Losing muscle alongside fat.', action: 'Reduce deficit by 100-200 cal/day. Bump protein to 1.2 g/lb (~220g).' };
      }
      if (wDir === 'stable' && bfDir === 'loss') {
        return { status: 'good', verdict: 'Recomposition — fat down, weight steady.', action: 'Gold-standard outcome for your stage. Keep going.' };
      }
      if (wDir === 'stable' && bfDir === 'stable') {
        return { status: 'warn', verdict: inCutMode ? 'No movement in ' + trend.windowDays + ' days.' : 'Steady — at maintenance.', action: inCutMode ? 'Deficit too small. Tighten by 150-250 cal/day or add a cardio session.' : 'If aiming for cut, drop intake or add training volume.' };
      }
      if (wDir === 'gain' && bfDir === 'loss') {
        return { status: 'good', verdict: 'Lean mass gain — gold for someone your stage.', action: 'Surplus is dialed in. Keep protein high.' };
      }
      if (wDir === 'gain' && bfDir === 'gain' && trend.bfRate > 0.2) {
        return { status: 'warn', verdict: 'Surplus too aggressive — gaining fat.', action: 'Cut intake 200 cal/day. Protein stays the same.' };
      }
      if (wDir === 'gain' && bfDir === 'gain') {
        return { status: 'good', verdict: 'Lean bulk on track — small fat gain expected.', action: 'Normal at this rate. Keep going.' };
      }
      return { status: 'unknown', verdict: 'Mixed signals.', action: 'Log a few more weeks to clarify the pattern.' };
    };

    // Linear projection of how long until you hit goal BF% at current rate.
    const computeBodyGoalProjection = (trend, bodyStats) => {
      if (!trend || !trend.hasEnoughData || trend.bfRate == null) return null;
      const goal = bodyStats?.goalBodyFatPct;
      if (goal == null) return null;
      const remaining = trend.bfNow - goal; // positive = need to lose more BF
      if (Math.abs(remaining) < 0.3) return { atGoal: true };
      // Only project if you're trending in the right direction.
      if (remaining > 0 && trend.bfRate >= 0) return { wrongDirection: true, remaining };
      if (remaining < 0 && trend.bfRate <= 0) return { wrongDirection: true, remaining };
      const weeks = Math.abs(remaining / trend.bfRate);
      const projectedDate = new Date(Date.now() + weeks * 7 * 86_400_000);
      return {
        weeks: Math.round(weeks),
        projectedDate,
        remaining,
      };
    };

    const BodyCompositionCard = ({ state, onOpenSettings }) => {
      const bs = state.bodyStats || defaultBodyStats;
      const wPoints = sparkPoints(state.bodyStatsHistory, 'weight');
      const bfPoints = sparkPoints(state.bodyStatsHistory, 'bodyFatPct');
      const wDelta = wPoints.length >= 2 ? formatDelta(wPoints[wPoints.length - 1].value, valueDaysAgo(wPoints, 30), ' lb', 1) : '—';
      const bfDelta = bfPoints.length >= 2 ? formatDelta(bfPoints[bfPoints.length - 1].value, valueDaysAgo(bfPoints, 30), '%', 1) : '—';
      const lastSync = bs.withingsLastSync ? formatRelative(bs.withingsLastSync) : null;
      const lastWeighIn = (state.bodyStatsHistory && state.bodyStatsHistory[0] && state.bodyStatsHistory[0].date) ? new Date(state.bodyStatsHistory[0].date).getTime() : null;
      const weighInDueDays = lastWeighIn ? Math.floor((Date.now() - lastWeighIn) / 86_400_000) : null;
      const weighInDue = weighInDueDays != null && weighInDueDays >= 7;
      const summary = (
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1.5">BODY COMPOSITION</div>
          <div className="flex items-baseline gap-3">
            <div>
              <span className="font-mono text-3xl font-bold text-neutral-50">{bs.weight}</span>
              <span className="text-xs text-neutral-500 font-mono ml-1">lb</span>
            </div>
            <div>
              <span className="font-mono text-2xl font-bold text-neutral-50">{bs.bodyFatPct ?? '—'}</span>
              <span className="text-xs text-neutral-500 font-mono ml-1">% bf</span>
            </div>
            <div className="text-xs text-neutral-500 font-mono">→ {bs.goalBodyFatPct}%</div>
          </div>
          <div className="text-[11px] font-mono mt-1.5">
            {weighInDue ? (
              <span className="text-orange-300">Weekly weigh-in due ({weighInDueDays}d since last)</span>
            ) : (
              <span className="text-neutral-600">{lastSync ? `Withings · ${lastSync}` : 'tap to log weigh-in or connect Withings'}</span>
            )}
          </div>
        </div>
      );
      return (
        <ExpandableCard summary={summary}>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <div className="flex items-baseline gap-1.5 mb-1">
                <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Weight</div>
                <div className={`ml-auto text-[10px] font-mono ${wPoints.length >= 2 && wPoints[wPoints.length - 1].value - valueDaysAgo(wPoints, 30) < 0 ? 'text-orange-300' : 'text-neutral-400'}`}>{wDelta} <span className="text-neutral-600">30d</span></div>
              </div>
              <Sparkline points={wPoints} color="#F97316" height={36} />
            </div>
            <div>
              <div className="flex items-baseline gap-1.5 mb-1">
                <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Body fat %</div>
                <div className={`ml-auto text-[10px] font-mono ${bfPoints.length >= 2 && bfPoints[bfPoints.length - 1].value - valueDaysAgo(bfPoints, 30) < 0 ? 'text-orange-300' : 'text-neutral-400'}`}>{bfDelta} <span className="text-neutral-600">30d</span></div>
              </div>
              <Sparkline points={bfPoints} color="#60a5fa" height={36} />
            </div>
          </div>

          {(() => {
            const trend = computeBodyTrend(state, 30);
            const diag = bodyDiagnostic(trend, bs);
            const proj = computeBodyGoalProjection(trend, bs);
            const fmtRate = (r, unit) => r == null ? '—' : `${r > 0 ? '+' : ''}${r.toFixed(2)} ${unit}/wk`;
            const statusColor = diag.status === 'good' ? 'text-green-400' : diag.status === 'warn' ? 'text-orange-300' : diag.status === 'bad' ? 'text-red-400' : 'text-neutral-400';
            const statusGlyph = diag.status === 'good' ? '✓' : diag.status === 'warn' ? '⚠' : diag.status === 'bad' ? '✗' : '•';
            return (
              <div className="mt-4 space-y-3">
                {trend.hasEnoughData ? (
                  <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-2">{trend.windowDays}-DAY TREND</div>
                    <div className="grid grid-cols-3 gap-2 text-center">
                      <div>
                        <div className="font-mono text-sm font-bold text-neutral-100">{fmtRate(trend.weightRate, 'lb')}</div>
                        <div className="text-[9px] uppercase tracking-wider text-neutral-500 mt-0.5">weight</div>
                      </div>
                      <div>
                        <div className="font-mono text-sm font-bold text-neutral-100">{fmtRate(trend.bfRate, '%')}</div>
                        <div className="text-[9px] uppercase tracking-wider text-neutral-500 mt-0.5">body fat</div>
                      </div>
                      <div>
                        <div className="font-mono text-sm font-bold text-neutral-100">{fmtRate(trend.leanRate, 'lb')}</div>
                        <div className="text-[9px] uppercase tracking-wider text-neutral-500 mt-0.5">lean mass</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 text-[11px] text-neutral-400 leading-snug">
                    Log {2 - (state.bodyStatsHistory?.length || 0)} more weigh-in{(2 - (state.bodyStatsHistory?.length || 0)) === 1 ? '' : 's'} to unlock trend analysis. Weekly Withings sync is enough.
                  </div>
                )}

                {proj && (
                  <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1.5">GOAL PROJECTION</div>
                    {proj.atGoal ? (
                      <div className="text-sm text-green-400">You're already at your goal BF%. Switch to maintenance.</div>
                    ) : proj.wrongDirection ? (
                      <div className="text-sm text-orange-300">Trending the wrong way — body fat {proj.remaining > 0 ? 'not dropping' : 'not climbing'} toward your {bs.goalBodyFatPct}% goal.</div>
                    ) : (
                      <div>
                        <div className="text-sm text-neutral-100">
                          {trend.bfNow.toFixed(1)}% → {bs.goalBodyFatPct}% in <span className="font-mono font-bold text-orange-300">~{proj.weeks} weeks</span>
                        </div>
                        <div className="text-[11px] text-neutral-500 font-mono mt-0.5">
                          on track to hit goal by {proj.projectedDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1.5">DIAGNOSTIC</div>
                  <div className={`text-sm font-semibold ${statusColor} mb-1`}>
                    {statusGlyph} {diag.verdict}
                  </div>
                  <div className="text-[11px] text-neutral-400 leading-snug">{diag.action}</div>
                </div>
              </div>
            );
          })()}

          <button onClick={(e) => { e.stopPropagation(); onOpenSettings(); }} className="w-full mt-3 py-2 rounded-lg border border-neutral-800 text-neutral-300 text-[10px] uppercase tracking-wider font-mono font-semibold hover:bg-neutral-900">
            Log weigh-in or sync Withings
          </button>
        </ExpandableCard>
      );
    };

    // ============================================================
    // RECOVERY CARD (Oura)
    // ============================================================
    const scoreColor = (n) => {
      if (n == null) return 'text-neutral-500';
      if (n >= 85) return 'text-green-400';
      if (n >= 70) return 'text-orange-300';
      return 'text-red-400';
    };

    const RecoveryCard = ({ state, onOpenSettings }) => {
      const o = state.oura;
      if (!o || !o.last_sync_at) {
        return (
          <button onClick={onOpenSettings} className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-xl p-4 mb-3 hover:border-neutral-700 active:scale-[0.99]">
            <div className="flex items-center justify-between mb-1">
              <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono">RECOVERY</div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-600 font-mono">tap to connect</div>
            </div>
            <div className="text-sm text-neutral-400">Sync Oura to see sleep, readiness, and live macro targets driven by actual calorie burn.</div>
          </button>
        );
      }

      const last = formatRelative(o.last_sync_at);
      const sleepHrs = o.sleep_hours_yesterday ? Math.round(o.sleep_hours_yesterday * 10) / 10 : null;
      const burnDaysPts = (o.days || [])
        .map((d) => ({ ts: new Date(d.date).getTime(), value: d.active_cal }))
        .filter((p) => p.ts && p.value != null);

      const summary = (
        <div>
          <div className="flex items-center justify-between mb-1.5">
            <div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-mono">RECOVERY</div>
          </div>
          <div className="flex items-baseline gap-3">
            <div>
              <span className={`font-mono text-3xl font-bold ${scoreColor(o.sleep_score_yesterday)}`}>{o.sleep_score_yesterday ?? '—'}</span>
              <span className="text-[10px] text-neutral-500 uppercase tracking-wider font-mono ml-1">sleep</span>
            </div>
            <div>
              <span className={`font-mono text-2xl font-bold ${scoreColor(o.readiness_score_today)}`}>{o.readiness_score_today ?? '—'}</span>
              <span className="text-[10px] text-neutral-500 uppercase tracking-wider font-mono ml-1">ready</span>
            </div>
            <div>
              <span className="font-mono text-2xl font-bold text-neutral-200">{o.active_burn_yesterday ?? '—'}</span>
              <span className="text-[10px] text-neutral-500 uppercase tracking-wider font-mono ml-1">burn</span>
            </div>
          </div>
          <div className="text-[11px] text-neutral-600 font-mono mt-1.5">TDEE {o.total_burn_7d_avg} · Oura {last}</div>
        </div>
      );
      return (
        <ExpandableCard summary={summary}>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Sleep</div>
              <div className={`font-mono text-2xl font-bold leading-tight ${scoreColor(o.sleep_score_yesterday)}`}>
                {o.sleep_score_yesterday ?? '—'}<span className="text-[10px] text-neutral-500 ml-0.5 font-normal">/100</span>
              </div>
              <div className="text-[9px] uppercase tracking-wider text-neutral-600 mt-0.5 font-mono">last night</div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Readiness</div>
              <div className={`font-mono text-2xl font-bold leading-tight ${scoreColor(o.readiness_score_today)}`}>
                {o.readiness_score_today ?? '—'}<span className="text-[10px] text-neutral-500 ml-0.5 font-normal">/100</span>
              </div>
              <div className="text-[9px] uppercase tracking-wider text-neutral-600 mt-0.5 font-mono">today</div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Active burn</div>
              <div className="font-mono text-2xl font-bold leading-tight text-neutral-50">
                {o.active_burn_yesterday ?? '—'}<span className="text-[10px] text-neutral-500 ml-0.5 font-normal">cal</span>
              </div>
              <div className="text-[9px] uppercase tracking-wider text-neutral-600 mt-0.5 font-mono">yesterday</div>
            </div>
          </div>
          {burnDaysPts.length >= 2 && (
            <div>
              <div className="flex items-baseline justify-between mb-1">
                <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">7-day active burn</div>
                <div className="text-[10px] text-neutral-500 font-mono">avg {o.active_burn_7d_avg} cal</div>
              </div>
              <Sparkline points={burnDaysPts} color="#a78bfa" height={28} />
            </div>
          )}
          <div className="text-[10px] text-neutral-600 mt-2 font-mono uppercase tracking-wider">
            TDEE {o.total_burn_7d_avg} · macros use this as your baseline
          </div>
        </ExpandableCard>
      );
    };

    // ============================================================
    // PACE CARD (weekly calibration)
    // ============================================================
    const PaceCard = ({ state, onOpenDiet }) => {
      const pace = computeWeeklyPace(state);
      const targets = computeMacroTargets(state.bodyStats, state.oura, pace);
      if (!pace.hasEnoughData) {
        return (
          <button onClick={onOpenDiet} className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-xl p-4 mb-3 hover:border-neutral-700 active:scale-[0.99]">
