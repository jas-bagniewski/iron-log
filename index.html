    // ============================================================
    const App = () => {
      const [state, setState] = useState(() => loadState());
      const [view, setView] = useState('home');
      const [activeDayId, setActiveDayId] = useState(state.activeSession?.dayId || null);
      const [syncStatus, setSyncStatus] = useState(cloudSync.getSecret() ? 'syncing' : 'off');

      // Hook up sync status callback
      useEffect(() => { cloudSync.onStatus(setSyncStatus); }, []);

      // Initial cloud pull on mount. Subsequent re-pulls go through handleResync.
      useEffect(() => {
        let cancelled = false;
        (async () => {
          if (!cloudSync.getSecret()) { setSyncStatus('off'); return; }
          setSyncStatus('syncing');
          const { state: cloud, status } = await cloudSync.pull();
          if (cancelled) return;
          if (status === 'unauthorized') { setSyncStatus('unauthorized'); return; }
          if (status === 'error') { setSyncStatus('error'); return; }
          if (cloud) {
            setState((prev) => ({
            ...prev,
            ...cloud,
            activeSession: cloud.activeSession ?? prev.activeSession,
            // Preserve the seeded default snack preferences if cloud's is empty.
            snackPreferences: (cloud.snackPreferences && cloud.snackPreferences.trim()) ? cloud.snackPreferences : (prev.snackPreferences || DEFAULT_SNACK_PREFERENCES),
          }));
            setSyncStatus('synced');
          } else {
            const s = await cloudSync.push(loadState());
            setSyncStatus(s);
          }
        })();
        return () => { cancelled = true; };
      }, []);

      useEffect(() => {
        saveState(state);
        if (cloudSync.getSecret()) cloudSync.scheduleSave(state);
      }, [state]);

      // Auto-sync Withings once per session if it's been >6 days since the last sync.
      const autoSyncedWithingsRef = React.useRef(false);
      useEffect(() => {
        if (autoSyncedWithingsRef.current) return;
        if (!state || !cloudSync.getSecret()) return;
        const last = state.bodyStats?.withingsLastSync;
        if (!last) return;
        if (Date.now() - last < 6 * 86_400_000) return;
        autoSyncedWithingsRef.current = true;
        const secret = cloudSync.getSecret();
        fetch('/api/withings/sync', { headers: { 'x-sync-secret': secret } })
          .then(r => r.ok ? r.json() : null)
          .then(j => {
            if (!j || j.weight_lb == null) return;
            setState(prev => {
              if (!prev) return prev;
              const nextBs = {
                ...prev.bodyStats,
                weight: j.weight_lb,
                bodyFatPct: j.body_fat_pct != null ? j.body_fat_pct : prev.bodyStats?.bodyFatPct,
                lastUpdated: new Date().toISOString(),
                withingsLastSync: j.last_sync_at,
                withingsLastMeasuredAt: j.measured_at,
                withingsLeanMassKg: j.lean_mass_kg,
                withingsFatMassKg: j.fat_mass_kg,
              };
              const history = [
                { date: todayKey(), weight: nextBs.weight, bodyFatPct: nextBs.bodyFatPct, source: 'withings-auto' },
                ...(prev.bodyStatsHistory || []),
              ].slice(0, 365);
              return { ...prev, bodyStats: nextBs, bodyStatsHistory: history };
            });
          })
          .catch(() => {});
      }, [state]);

      // Auto-sync Oura whenever the app sees daylight and the last sync is
      // stale (>30 min). Triggers on initial mount, on every state change once
      // the threshold has elapsed, AND on visibilitychange (so foregrounding
      // the app from background pulls fresh data without a manual sync).
      // Concurrent syncs are blocked by ouraSyncingRef.
      const ouraSyncingRef = React.useRef(false);
      const stateRef = React.useRef(state);
      useEffect(() => { stateRef.current = state; }, [state]);
      const STALE_MS = 30 * 60_000;
      const tryOuraSync = () => {
        if (ouraSyncingRef.current) return;
        const secret = cloudSync.getSecret();
        if (!secret) return;
        const last = (stateRef.current && stateRef.current.oura && stateRef.current.oura.last_sync_at) || 0;
        if (last && Date.now() - last < STALE_MS) return;
        ouraSyncingRef.current = true;
        fetch('/api/oura/sync', { headers: { 'x-sync-secret': secret } })
          .then(r => r.ok ? r.json() : null)
          .then(j => {
            if (j && j.last_sync_at) {
              setState(prev => prev ? { ...prev, oura: j } : prev);
            }
          })
          .catch(() => {})
          .finally(() => { ouraSyncingRef.current = false; });
      };

      // Mount + state change → maybe sync (threshold-gated)
      useEffect(() => {
        if (state && cloudSync.getSecret()) tryOuraSync();
      }, [state]);

      // App returns from background → maybe sync
      useEffect(() => {
        const onVis = () => { if (document.visibilityState === 'visible') tryOuraSync(); };
        document.addEventListener('visibilitychange', onVis);
        window.addEventListener('focus', onVis);
        return () => {
          document.removeEventListener('visibilitychange', onVis);
          window.removeEventListener('focus', onVis);
        };
      }, []);

      useEffect(() => {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hide');
      }, []);

      const [completionSummary, setCompletionSummary] = useState(null);

      const handleStart = (dayId) => { setActiveDayId(dayId); setView('session'); };
      const handleComplete = (session) => {
        const next = finishSession(state, session);
        const completedWithMeta = { ...session, completedAt: new Date().toISOString() };
        const summary = buildSessionSummary(state, next, completedWithMeta);
        setState(next);
        setActiveDayId(null);
        setCompletionSummary(summary);
        setView('complete');

        // Trigger an Oura sync in the background so the recovery card on the
        // summary screen (and Home next visit) shows today's freshest data,
        // including readiness if Oura has computed it since the last sync.
        const secret = cloudSync.getSecret();
        if (secret) {
          fetch('/api/oura/sync', { headers: { 'x-sync-secret': secret } })
            .then(r => r.ok ? r.json() : null)
            .then(j => {
              if (!j || !j.last_sync_at) return;
              setState(prev => prev ? { ...prev, oura: j } : prev);
            })
            .catch(() => {});
        }
      };
      const handleCancel = () => setView('log');
      const handleSummaryDone = () => { setCompletionSummary(null); setView('log'); };

      // Called from Settings after the secret changes or a manual pull is requested.
      const handleResync = async () => {
        if (!cloudSync.getSecret()) { setSyncStatus('off'); return; }
        setSyncStatus('syncing');
        const { state: cloud, status } = await cloudSync.pull();
        if (status === 'unauthorized') { setSyncStatus('unauthorized'); return; }
        if (status === 'error') { setSyncStatus('error'); return; }
        if (cloud) {
          setState((prev) => ({
            ...prev,
            ...cloud,
            activeSession: cloud.activeSession ?? prev.activeSession,
            // Preserve the seeded default snack preferences if cloud's is empty.
            snackPreferences: (cloud.snackPreferences && cloud.snackPreferences.trim()) ? cloud.snackPreferences : (prev.snackPreferences || DEFAULT_SNACK_PREFERENCES),
          }));
          setSyncStatus('synced');
        } else {
          const s = await cloudSync.push(state);
          setSyncStatus(s);
        }
      };

      const tabBarVisible = view === 'home' || view === 'log' || view === 'diet';

      return (
        <div className="min-h-screen bg-black text-neutral-100">
          {view === 'home' && <HomeView state={state} syncStatus={syncStatus} onSettings={() => setView('settings')} onDiet={() => setView('diet')} />}
          {view === 'log' && <IronLogView state={state} onStart={handleStart} onSettings={() => setView('settings')} />}
          {view === 'diet' && <DietView state={state} onBack={() => setView('home')} onUpdateState={setState} />}
          {view === 'session' && activeDayId && <SessionView state={state} dayId={activeDayId} onComplete={handleComplete} onCancel={handleCancel} onUpdateState={setState} />}
          {view === 'complete' && completionSummary && <SessionCompleteView summary={completionSummary} onDone={handleSummaryDone} />}
          {view === 'settings' && <SettingsView state={state} syncStatus={syncStatus} onBack={() => setView('home')} onUpdateState={setState} onResync={handleResync} />}
          {tabBarVisible && <TabBar current={view} onChange={setView} />}
        </div>
      );
    };

    // ============================================================
    // BOTTOM TAB BAR
    // ============================================================
    const TabBar = ({ current, onChange }) => {
      const tabs = [
        { id: 'home', label: 'Home',    icon: Home },
        { id: 'log',  label: 'Iron Log',icon: Dumbbell },
        { id: 'diet', label: 'Diet',    icon: Utensils },
      ];
      return (
        <div className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur border-t border-neutral-800 z-30"
             style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
          <div className="max-w-2xl mx-auto grid grid-cols-3">
            {tabs.map(t => {
              const Ic = t.icon;
              const active = current === t.id;
              return (
                <button key={t.id} onClick={() => onChange(t.id)}
                  className={`flex flex-col items-center justify-center py-2.5 gap-1 ${active ? 'text-orange-400' : 'text-neutral-500 hover:text-neutral-200'}`}>
                  <Ic size={20} strokeWidth={active ? 2.5 : 2} />
                  <div className={`text-[10px] uppercase tracking-wider font-mono ${active ? 'font-bold' : ''}`}>{t.label}</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
