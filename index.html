            <div className="flex items-center justify-between mb-1">
              <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono">PACE</div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-600 font-mono">{pace.daysCounted}/3 days</div>
            </div>
            <div className="text-sm text-neutral-400">Log meals for at least 3 days to see pace.</div>
          </button>
        );
      }
      const targetDailyDelta = targets.baseKcal - targets.maintenance;
      const excess = pace.actualDailyDelta - targetDailyDelta;
      const onTrack = Math.abs(excess) < 100;
      const ahead = excess < -100;
      const adjustment = targets.adjustment;

      const status = onTrack ? 'On pace' : ahead ? `Ahead by ${Math.abs(Math.round(excess))} cal/d` : `Behind by ${Math.round(excess)} cal/d`;
      const statusColor = onTrack ? 'text-green-400' : ahead ? 'text-blue-300' : 'text-orange-300';
      const modeLabel = targets.mode.toUpperCase();
      const goalSign = targetDailyDelta < 0 ? '' : '+';

      return (
        <button onClick={onOpenDiet} className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-xl p-4 mb-3 hover:border-neutral-700 active:scale-[0.99]">
          <div className="flex items-center justify-between mb-3">
            <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono">PACE · 7 DAYS</div>
            <div className={`text-[10px] uppercase tracking-wider font-mono font-semibold ${statusColor}`}>{status}</div>
          </div>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Intake</div>
              <div className="font-mono text-xl font-bold text-neutral-50 leading-tight">{pace.avgIntake}<span className="text-[10px] text-neutral-500 ml-0.5">cal/d</span></div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Burn</div>
              <div className="font-mono text-xl font-bold text-neutral-50 leading-tight">{pace.avgBurn}<span className="text-[10px] text-neutral-500 ml-0.5">cal/d</span></div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Net</div>
              <div className={`font-mono text-xl font-bold leading-tight ${pace.actualDailyDelta < 0 ? 'text-orange-300' : 'text-neutral-50'}`}>
                {pace.actualDailyDelta > 0 ? '+' : ''}{pace.actualDailyDelta}<span className="text-[10px] text-neutral-500 ml-0.5">cal/d</span>
              </div>
            </div>
          </div>
          <div className="text-[11px] text-neutral-500 leading-snug">
            Goal ({modeLabel.toLowerCase()}): {goalSign}{targetDailyDelta} cal/d.
            {adjustment === 0 ? ' Today stays at baseline.' :
              ` Today's target ${adjustment > 0 ? '+' : ''}${adjustment} cal vs baseline ${targets.baseKcal} → ${targets.kcal} cal.`}
          </div>
        </button>
      );
    };

    // ============================================================
    // STRENGTH EVOLUTION CARD (TMs + e1RM merged)
    // ============================================================
    const pctColor = (p) => {
      if (p == null) return 'text-neutral-500';
      if (p >= 75) return 'text-green-400';
      if (p >= 50) return 'text-orange-300';
      if (p >= 25) return 'text-neutral-300';
      return 'text-red-400';
    };

    const StrengthEvolutionCard = ({ state }) => {
      const history = state.trainingMaxesHistory || [];
      const tm = state.trainingMaxes;
      const bs = state.bodyStats || {};
      const benchPts = sparkPoints(history, 'bench');
      const squatPts = sparkPoints(history, 'squat');
      const dlPts = sparkPoints(history, 'deadlift');
      const pressPts = sparkPoints(history, 'press');
      const benchE = getBestE1RM(state.history, 'bench');
      const squatE = getBestE1RM(state.history, 'squat');
      const dlE = getBestE1RM(state.history, 'deadlift');
      const pressE = getBestE1RM(state.history, 'press');
      const lifts = [
        { id: 'bench',    label: 'Bench',    pts: benchPts, val: tm.bench,         e1RM: benchE, standards: adjustedStandards('bench', bs.weight, bs.age),    color: '#F97316' },
        { id: 'press',    label: 'Press',    pts: pressPts, val: tm.press || 85,   e1RM: pressE, standards: adjustedStandards('press', bs.weight, bs.age),    color: '#fbbf24' },
        { id: 'squat',    label: 'Squat',    pts: squatPts, val: tm.squat,         e1RM: squatE, standards: adjustedStandards('squat', bs.weight, bs.age),    color: '#84cc16' },
        { id: 'deadlift', label: 'Deadlift', pts: dlPts,    val: tm.deadlift,      e1RM: dlE,    standards: adjustedStandards('deadlift', bs.weight, bs.age), color: '#a78bfa' },
      ];
      const overall = overallStrengthPercentile(state);
      const overallColor = overall == null ? 'text-neutral-500'
        : overall >= 75 ? 'text-green-400' : overall >= 50 ? 'text-orange-300' : overall >= 25 ? 'text-neutral-300' : 'text-red-400';
      const summary = (
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1.5">TRAINING MAXES</div>
          {overall != null ? (
            <div className="flex items-baseline gap-2">
              <div className={`font-mono text-3xl font-bold leading-none ${overallColor}`}>{overall}<span className="text-base">th</span></div>
              <div className={`text-[11px] uppercase tracking-widest font-mono font-semibold ${overallColor}`}>{percentileLabel(overall)}</div>
            </div>
          ) : (
            <div className="font-mono text-lg text-neutral-300">
              Bench {tm.bench} · Squat {tm.squat} · DL {tm.deadlift}
            </div>
          )}
          <div className="text-[11px] text-neutral-600 font-mono mt-1.5">
            {bs.weight ? `Overall strength · ${bs.weight} lb · ${bs.age}y cohort` : 'set body stats to see percentile'}
          </div>
        </div>
      );
      return (
        <ExpandableCard summary={summary}>
          <div className="grid grid-cols-2 gap-3">
            {lifts.map(l => {
              const delta = l.pts.length >= 2 ? formatDelta(l.pts[l.pts.length - 1].value, valueDaysAgo(l.pts, 90), '', 0) : '—';
              const strengthValue = l.e1RM || l.val;
              const pct = l.standards ? computePercentile(strengthValue, l.standards) : null;
              const next = l.standards ? nextMilestone(strengthValue, l.standards) : null;
              return (
                <div key={l.id}>
                  <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">{l.label}</div>
                  <div className="flex items-baseline gap-1 mb-0.5">
                    <div className="font-mono text-xl font-bold text-neutral-50">{l.val}</div>
                    <div className="text-[10px] text-neutral-500">lb</div>
                  </div>
                  <div className="text-[9px] uppercase tracking-wider text-neutral-600 font-mono mb-0.5">
                    {l.e1RM ? `1RM ${l.e1RM}` : 'no AMRAP'}
                  </div>
                  {pct != null && (
                    <div className="text-[10px] font-mono mb-1">
                      <span className={`font-bold ${pctColor(pct)}`}>{pct}<span className="text-[8px]">th</span></span>
                      <span className="text-neutral-600 ml-1 uppercase tracking-wider text-[9px]">{percentileLabel(pct)}</span>
                    </div>
                  )}
                  <Sparkline points={l.pts} color={l.color} height={24} />
                  <div className="flex items-center justify-between mt-1 gap-1">
                    <div className="text-[10px] text-neutral-500 font-mono">{delta}</div>
                    {next && (
                      <div className="text-[9px] text-neutral-600 font-mono uppercase tracking-wider">
                        →{next.value} <span className="text-neutral-700">{next.pct}th</span>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </ExpandableCard>
      );
    };

    // ============================================================
    // CALORIE BALANCE CARD (7-day cumulative + yesterday + today so far)
    // ============================================================
    const CalorieBalanceCard = ({ state, onOpenDiet }) => {
      const bal = computeCalorieBalance(state);
      const targets = computeMacroTargets(state.bodyStats, state.oura, null);
      const dailyGoal = targets.baseKcal - targets.maintenance; // negative cutting, 0 maintain, positive bulk
      const weeklyGoal = dailyGoal * 7;
      const fmt = (n) => n == null ? '—' : `${n > 0 ? '+' : ''}${Math.round(n)}`;
      // Per-day zone vs the day's expected delta (for Today, prorate to time of
      // day so a -200 net at noon isn't read as "too aggressive" against a
      // full-day -300 goal). Returns color + short label so the user can
      // read at a glance if a day is healthy, mildly off, or course-correctable.
      const dayZone = (net, expected) => {
        if (net == null || expected == null) return { color: 'text-neutral-500', label: null };
        const distance = net - expected; // > 0 = ate too much, < 0 = too aggressive
        const abs = Math.abs(distance);
        if (abs <= 150) return { color: 'text-green-400', label: 'On target' };
        if (abs <= 400) return {
          color: 'text-orange-300',
          label: distance < 0
            ? (dailyGoal < 0 ? 'A bit aggressive' : 'Light on intake')
            : (dailyGoal < 0 ? 'Light deficit' : 'A bit over goal'),
        };
        return {
          color: 'text-red-400',
          label: distance < 0
            ? (dailyGoal < 0 ? 'Too aggressive' : 'Way under')
            : (dailyGoal < 0 ? 'Way over goal' : 'Way over'),
        };
      };
      const todayExpected = dailyGoal * (bal.today.fractionOfDay || 1);
      const todayZone = dayZone(bal.today.net, todayExpected);
      const yesterdayZone = bal.yesterday.hasIntake ? dayZone(bal.yesterday.net, dailyGoal) : { color: 'text-neutral-500', label: null };
      // Goal-aware coloring for the 7-day cumulative number.
      // "Goal" = weeklyGoal cal. ±700 cal/week (~100/d) = green, ±2100 = orange, beyond = red.
      const goalZone = (() => {
        const distance = bal.cumulative.net - weeklyGoal;
        const abs = Math.abs(distance);
        if (abs <= 700) return { color: 'text-green-400', label: 'On target', dot: 'bg-green-400' };
        if (abs <= 2100) return { color: 'text-orange-300', label: distance < 0 ? 'Too aggressive' : (dailyGoal < 0 ? 'Not enough deficit' : (dailyGoal > 0 ? 'Not enough surplus' : 'Off maintenance')), dot: 'bg-orange-300' };
        return { color: 'text-red-400', label: distance < 0 ? 'Way too aggressive' : (dailyGoal < 0 ? 'Way over goal' : (dailyGoal > 0 ? 'Way under goal' : 'Off maintenance')), dot: 'bg-red-400' };
      })();
      const ouraConnected = !!(state.oura && state.oura.last_sync_at);
      const haveAnyMeals = bal.cumulative.days > 0 || bal.today.intake > 0;
      if (!haveAnyMeals && !ouraConnected) {
        return (
          <button onClick={onOpenDiet} className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-xl p-4 mb-3 hover:border-neutral-700 active:scale-[0.99]">
            <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-2">CALORIE BALANCE</div>
            <div className="text-sm text-neutral-400">Log meals and connect Oura to see your deficit/surplus.</div>
          </button>
        );
      }
      const goalText = dailyGoal < 0 ? `${dailyGoal} cal/d (cut)` : dailyGoal > 0 ? `+${dailyGoal} cal/d (bulk)` : 'maintenance';
      const summary = (
        <div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1.5">CALORIE BALANCE</div>
          {bal.cumulative.days >= 3 ? (
            <div className="flex items-baseline gap-2">
              <div className={`font-mono text-3xl font-bold leading-none ${goalZone.color}`}>{fmt(bal.cumulative.net)}</div>
              <div className={`text-[11px] uppercase tracking-widest font-mono font-semibold ${goalZone.color}`}>{goalZone.label}</div>
            </div>
          ) : (
            <div className="text-[15px] text-neutral-400">Log {3 - bal.cumulative.days} more day{3 - bal.cumulative.days === 1 ? '' : 's'} to see 7-day pace</div>
          )}
          <div className="text-[11px] text-neutral-600 font-mono mt-1.5">7d cumulative · goal {goalText}</div>
        </div>
      );
      return (
        <ExpandableCard summary={summary}>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Today</div>
              <div className={`font-mono text-xl font-bold leading-tight ${todayZone.color}`}>{fmt(bal.today.net)}</div>
              {todayZone.label && (
                <div className={`text-[9px] uppercase tracking-wider font-mono font-semibold ${todayZone.color}`}>{todayZone.label}</div>
              )}
              <div className="text-[9px] uppercase tracking-wider text-neutral-600 font-mono mt-0.5">
                {Math.round(bal.today.intake)} in · {Math.round(bal.today.burn)} out{bal.today.fromOura ? '' : ' (est)'}
              </div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Yesterday</div>
              <div className={`font-mono text-xl font-bold leading-tight ${yesterdayZone.color}`}>
                {bal.yesterday.hasIntake ? fmt(bal.yesterday.net) : '—'}
              </div>
              {yesterdayZone.label && (
                <div className={`text-[9px] uppercase tracking-wider font-mono font-semibold ${yesterdayZone.color}`}>{yesterdayZone.label}</div>
              )}
              <div className="text-[9px] uppercase tracking-wider text-neutral-600 font-mono mt-0.5">
                {bal.yesterday.hasIntake ? `${Math.round(bal.yesterday.intake)} in · ${Math.round(bal.yesterday.burn)} out` : 'no meals logged'}
              </div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">7-day</div>
              <div className={`font-mono text-xl font-bold leading-tight ${goalZone.color}`}>{fmt(bal.cumulative.net)}</div>
              <div className="text-[9px] uppercase tracking-wider text-neutral-600 font-mono mt-0.5">
                {bal.cumulative.days}/7 days logged · ≈{(Math.abs(bal.cumulative.net) / 3500).toFixed(1)} lb {bal.cumulative.net < 0 ? 'loss' : 'gain'}
              </div>
            </div>
          </div>

          {/* Course correction: surface what the auto-adjustment is and why */}
          {bal.cumulative.days >= 3 ? (() => {
            const pace = computeWeeklyPace(state);
            const targetsWithPace = computeMacroTargets(state.bodyStats, state.oura, pace);
            const adj = targetsWithPace.adjustment;
            const distance = bal.cumulative.net - weeklyGoal;
            // adj > 0 = eat more today (you were too aggressive). adj < 0 = eat less (not deficit enough).
            const onPace = Math.abs(adj) < 50;
            return (
              <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 mb-3">
                <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1.5">COURSE CORRECTION</div>
                {onPace ? (
                  <div className="text-sm text-green-400 mb-1">On pace — keep going.</div>
                ) : adj > 0 ? (
                  <div className="text-sm text-orange-300 mb-1">
                    Trending too aggressive — averaging {Math.round(pace.actualDailyDelta)} cal/d vs {dailyGoal} cal/d goal.
                    <div className="text-[11px] text-neutral-400 mt-1.5 leading-snug">
                      Eat <span className="font-mono text-orange-200 font-bold">+{adj} cal/day</span> for the next 3 days to recover. Today's target already auto-adjusted up by {adj} cal — see Today's Diet tile.
                    </div>
                  </div>
                ) : (
                  <div className="text-sm text-blue-300 mb-1">
                    Not enough deficit — averaging {Math.round(pace.actualDailyDelta)} cal/d vs {dailyGoal} cal/d goal.
                    <div className="text-[11px] text-neutral-400 mt-1.5 leading-snug">
                      Cut <span className="font-mono text-blue-200 font-bold">{Math.abs(adj)} cal/day</span> for the next 3 days. Today's target already auto-adjusted down by {Math.abs(adj)} cal.
                    </div>
                  </div>
                )}
              </div>
            );
          })() : (
            <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 mb-3">
              <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-mono mb-1">COURSE CORRECTION</div>
              <div className="text-[11px] text-neutral-400 leading-snug">

    // ============================================================
    // SESSION VIEW
    // ============================================================
    const SessionView = ({ state, dayId, onComplete, onCancel, onUpdateState }) => {
      const [session, setSession] = useState(() => {
        if (state.activeSession && state.activeSession.dayId === dayId) return state.activeSession;
        return buildSession(dayId, state);
      });

      useEffect(() => { onUpdateState({ ...state, activeSession: session }); }, [session]);

      const toggleMain = (id) => setSession(p => ({ ...p, mainSets: p.mainSets.map(s => s.id === id ? { ...s, completed: !s.completed } : s) }));
      const logAmrap = (id, reps) => setSession(p => ({ ...p, mainSets: p.mainSets.map(s => s.id === id ? { ...s, completed: true, actualReps: reps } : s) }));
      const updateAcc = (acc) => setSession(p => ({ ...p, accessories: p.accessories.map(a => a.id === acc.id ? acc : a) }));
      const toggleSup = (id) => setSession(p => p.supplementary ? ({ ...p, supplementary: { ...p.supplementary, sets: p.supplementary.sets.map(s => s.id === id ? { ...s, completed: !s.completed } : s) } }) : p);

      const supSets = session.supplementary ? session.supplementary.sets : [];
      const mainTotal = session.mainSets.length;
      const mainDone = session.mainSets.filter(s => s.completed).length;
      const supTotal = supSets.length;
      const supDone = supSets.filter(s => s.completed).length;
      const accTotal = session.accessories.reduce((s, a) => s + a.setData.length, 0);
      const accDone = session.accessories.reduce((s, a) => s + a.setData.filter(x => x.completed).length, 0);
      const totalDone = mainDone + supDone + accDone;
      const totalSets = mainTotal + supTotal + accTotal;
      const progress = totalSets ? (totalDone / totalSets) * 100 : 0;
      const mainComplete = mainDone === mainTotal;

      return (
        <div className="px-5 pb-32 pt-6 max-w-2xl mx-auto">
          <div className="flex items-center justify-between mb-6">
            <button onClick={onCancel} className="flex items-center gap-1 text-neutral-400 hover:text-neutral-100 text-sm uppercase tracking-wider">
              <ChevronLeft size={18} /> Back
            </button>
            <div className="text-xs uppercase tracking-[0.2em] font-mono text-neutral-500">
              C{session.cycle} · W{session.week} · {session.weekLabel}
            </div>
          </div>

          <div className="font-display text-4xl tracking-wide text-neutral-50 mb-1">{session.name.toUpperCase()}</div>
          <div className="text-sm text-neutral-500 mb-6">
            {session.isVolume ? 'Volume bench + supporting lifts' : 'Main lift + accessories'}
          </div>

          <div className="mb-6">
            <div className="flex justify-between text-xs font-mono text-neutral-500 mb-2">
              <span>{totalDone}/{totalSets} SETS</span><span>{Math.round(progress)}%</span>
            </div>
            <div className="h-1.5 bg-neutral-900 rounded-full overflow-hidden">
              <div className="h-full bg-orange-500 transition-all duration-300" style={{ width: `${progress}%` }} />
            </div>
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-4 md:p-5 mb-4">
            <div className="mb-4">
              <div className="text-[10px] uppercase tracking-widest text-orange-400 font-semibold mb-1">MAIN LIFT</div>
              <div className="text-xl font-bold text-neutral-50 tracking-tight">{session.mainName}</div>
              {session.isVolume && <div className="text-xs text-neutral-500 mt-1">Lighter weight, focus on speed and form</div>}
            </div>
            <div className="space-y-2">
              {session.mainSets.map((set, i) => (
                <MainSetRow key={set.id} set={set} idx={i}
                  onToggle={() => toggleMain(set.id)}
                  onAmrap={(reps) => logAmrap(set.id, reps)} />
              ))}
            </div>
          </div>

          {session.supplementary && (
            <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-4 md:p-5 mb-4">
              <div className="mb-4">
                <div className="text-[10px] uppercase tracking-widest text-orange-400 font-semibold mb-1">SUPPLEMENTARY</div>
                <div className="text-xl font-bold text-neutral-50 tracking-tight">{session.supplementary.name}</div>
                <div className="text-xs text-neutral-500 mt-1">Boring But Big volume work — submaximal weight, no AMRAP.</div>
              </div>
              <div className="space-y-2">
                {session.supplementary.sets.map((set, i) => (
                  <MainSetRow key={set.id} set={set} idx={i}
                    onToggle={() => toggleSup(set.id)}
                    onAmrap={() => {}} />
                ))}
              </div>
            </div>
          )}

          <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono mb-3">ACCESSORIES</div>
          <div className="space-y-3">
            {session.accessories.map(acc => (
              <AccessoryCard key={acc.id} ex={acc} onUpdate={updateAcc} />

          <div className="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black/95 to-transparent" style={{ paddingBottom: 'calc(1rem + env(safe-area-inset-bottom))' }}>

              <button onClick={() => onComplete(session)} disabled={!mainComplete}
                className={`w-full py-5 rounded-xl font-bold uppercase tracking-[0.15em] text-sm transition-all ${
                  mainComplete ? 'bg-orange-500 hover:bg-orange-400 text-black active:scale-[0.99]' : 'bg-neutral-900 text-neutral-600 cursor-not-allowed'
                }`}>
                {totalDone === totalSets ? 'Finish Workout' : mainComplete ? 'Log Workout' : 'Finish Main Lift First'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // DIET — MACRO BAR
    // ============================================================
    const MacroBar = ({ label, current, target, unit = 'g', accent = 'orange' }) => {
      const pct = target > 0 ? Math.min(100, (current / target) * 100) : 0;
      const remaining = Math.max(0, target - current);
      const over = current > target;
      const accentBg = over ? 'bg-red-500' : (accent === 'orange' ? 'bg-orange-500' : `bg-${accent}-500`);
      const accentText = over ? 'text-red-400' : (accent === 'orange' ? 'text-orange-400' : `text-${accent}-400`);
      return (
        <div>
          <div className="flex items-baseline justify-between mb-1.5">
            <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono">{label}</div>
            <div className="font-mono text-sm">
              <span className="text-neutral-100 font-bold">{Math.round(current)}</span>
              <span className="text-neutral-500"> / {target}{unit}</span>
              <span className={`ml-2 text-[10px] ${accentText}`}>
                {over ? `+${Math.round(current - target)} over` : `${Math.round(remaining)} left`}
              </span>
            </div>
          </div>
          <div className="h-2 bg-neutral-900 rounded-full overflow-hidden">
            <div className={`h-full ${accentBg} transition-all duration-300`} style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    };

    // ============================================================
    // MEAL EDIT FORM (shared between manual-add and photo-confirm)
    // ============================================================
    const MealEditForm = ({ initial, onSave, onCancel, photoPending = false, savingLabel = 'Log meal', allowEstimate = true }) => {
      const [name, setName] = useState(initial?.name || '');
      const [kcal, setKcal] = useState(initial?.kcal ?? '');
      const [protein, setProtein] = useState(initial?.protein ?? '');
      const [carbs, setCarbs] = useState(initial?.carbs ?? '');
      const [fat, setFat] = useState(initial?.fat ?? '');
      const [items, setItems] = useState(initial?.items || null);
      const [estimating, setEstimating] = useState(false);
      const [estimateError, setEstimateError] = useState(null);

      useEffect(() => {
        if (initial) {
          setName(initial.name || '');
          setKcal(initial.kcal ?? '');
          setProtein(initial.protein ?? '');
          setCarbs(initial.carbs ?? '');
          setFat(initial.fat ?? '');
          setItems(initial.items || null);
        }
      }, [initial]);

      const submit = () => {
        const n = (name || '').trim() || 'Meal';
        onSave({
          name: n,
          kcal: parseInt(kcal, 10) || 0,
          protein: parseInt(protein, 10) || 0,
          carbs: parseInt(carbs, 10) || 0,
          fat: parseInt(fat, 10) || 0,
          items: items || null,
        });
      };

      const estimateFromName = async () => {
        const desc = (name || '').trim();
        if (!desc) { setEstimateError('Type the meal first, e.g. "4 boiled eggs"'); return; }
        setEstimating(true);
        setEstimateError(null);
        try {
          const result = await analyzeMealText(desc);
          const total = result.total || {};
          if (result.name) setName(result.name);
          setKcal(String(total.kcal || 0));
          setProtein(String(total.protein_g || 0));
          setCarbs(String(total.carbs_g || 0));
          setFat(String(total.fat_g || 0));
          setItems(result.items || null);
        } catch (e) {
          setEstimateError(e.message || 'Estimate failed');
        } finally {
          setEstimating(false);
        }
      };

      const numField = (label, val, onChange, hint) => (
        <div>
          <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">{label}</div>
          <input type="number" inputMode="numeric" value={val} onChange={(e) => onChange(e.target.value)}
            className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-3 text-neutral-50 font-mono text-xl font-bold text-center outline-none" />
          {hint && <div className="text-[9px] text-neutral-600 mt-1 text-center">{hint}</div>}
        </div>
      );

      return (
        <div>
          <div className="mb-3">
            <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">Meal</div>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)}
              placeholder="e.g. 4 boiled eggs"
              className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-3 text-neutral-50 outline-none" />
          </div>
          {allowEstimate && (
            <button onClick={estimateFromName} disabled={estimating || photoPending}
              className="w-full mb-3 py-2.5 rounded-lg border border-dashed border-orange-500/40 text-orange-300 text-xs uppercase tracking-wider font-semibold hover:bg-orange-500/5 active:scale-[0.99] disabled:opacity-40 flex items-center justify-center gap-2">
              {estimating ? (
                <><div className="w-3 h-3 rounded-full border-2 border-orange-500/30 border-t-orange-500 animate-spin" />Estimating…</>
              ) : (
                <>Estimate macros from name</>
              )}
            </button>
          )}
          {estimateError && (
            <div className="mb-3 px-3 py-2 rounded-lg border border-red-900/40 bg-red-950/30 text-red-300 text-[11px]">{estimateError}</div>
          )}
          <div className="grid grid-cols-4 gap-2 mb-4">
            {numField('Cal', kcal, setKcal)}
            {numField('Pro', protein, setProtein, 'g')}
            {numField('Carb', carbs, setCarbs, 'g')}
            {numField('Fat', fat, setFat, 'g')}
          </div>
          {items && items.length > 0 && (
            <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 mb-4">
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-2">Identified items</div>
              {items.map((it, i) => (
                <div key={i} className="text-xs text-neutral-300 flex justify-between py-0.5">
                  <span>{it.food}{it.portion ? ` · ${it.portion}` : ''}</span>
                  <span className="font-mono text-neutral-500">{it.kcal} cal</span>
                </div>
              ))}
            </div>
          )}
          <div className="flex gap-2">
            <button onClick={onCancel} disabled={photoPending}
              className="flex-1 py-3 rounded-lg border border-neutral-800 text-neutral-400 uppercase tracking-wider text-sm font-semibold hover:bg-neutral-900 disabled:opacity-40">
              Cancel

            <button onClick={submit} disabled={photoPending}

              {savingLabel}
            </button>
          </div>
        </div>

    // ============================================================
    // ADD MEAL VIEW

    // ============================================================
    // TOP OFF MACROS VIEW (AI snack suggester to close end-of-day gaps)
    // ============================================================
    const TopOffView = ({ state, onUpdateState, onSave, onCancel }) => {
      const today = todayKey();
      const meals = (state.mealsByDate && state.mealsByDate[today]) || [];
      const totals = sumMeals(meals);
      const pace = computeWeeklyPace(state);
      const targets = computeMacroTargets(state.bodyStats, state.oura, pace);
      const remaining = {
        kcal:    Math.max(0, targets.kcal - totals.kcal),
        protein: Math.max(0, targets.protein - totals.protein),
        carbs:   Math.max(0, targets.carbs - totals.carbs),
        fat:     Math.max(0, targets.fat - totals.fat),
      };

      const [prefsInput, setPrefsInput] = useState(state.snackPreferences || '');
      const [prefsSaved, setPrefsSaved] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [suggestions, setSuggestions] = useState(null);

      const savePreferences = () => {
        onUpdateState({ ...state, snackPreferences: prefsInput });
        setPrefsSaved(true);
        setTimeout(() => setPrefsSaved(false), 1500);
      };

      const suggest = async () => {
        const secret = cloudSync.getSecret();
        setLoading(true);
        setError(null);
        setSuggestions(null);
        if (prefsInput !== (state.snackPreferences || '')) savePreferences();
        try {
          const r = await fetch('/api/topoff', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(secret ? { 'x-sync-secret': secret } : {}) },
            body: JSON.stringify({
              remaining,
              preferences: prefsInput,
              priority: 'protein_first',
            }),
          });
          if (!r.ok) {
            const j = await r.json().catch(() => ({}));
            throw new Error(j.error || `HTTP ${r.status}`);
          }
          const j = await r.json();
          setSuggestions(j.suggestions || []);
        } catch (e) {
          setError(String(e.message || e));
        } finally {
          setLoading(false);
        }
      };

      const addSuggestion = (s) => {
        onSave({
          name: s.name,
          kcal: Math.round(s.kcal || 0),
          protein: Math.round(s.protein_g || 0),
          carbs: Math.round(s.carbs_g || 0),
          fat: Math.round(s.fat_g || 0),
          items: [{ food: s.name, portion: s.portion || '', kcal: s.kcal, protein_g: s.protein_g, carbs_g: s.carbs_g, fat_g: s.fat_g }],
          source: 'topoff',
        });
      };

      const macroChip = (label, val, unit = 'g') => (
        <div className={`px-2.5 py-1.5 rounded-lg ${label === 'Protein' ? 'bg-orange-500/15 border border-orange-500/40' : 'bg-neutral-900 border border-neutral-800'}`}>
          <div className="text-[9px] uppercase tracking-wider text-neutral-500 font-mono">{label}</div>
          <div className={`font-mono text-lg font-bold ${label === 'Protein' ? 'text-orange-300' : 'text-neutral-100'}`}>{val}<span className="text-[10px] text-neutral-500 font-normal ml-0.5">{unit}</span></div>
        </div>
      );

      return (
        <div className="fixed inset-0 bg-black/90 z-40 overflow-y-auto" onClick={onCancel}>
          <div className="min-h-full flex items-start sm:items-center justify-center p-4 pt-10 sm:pt-4">
            <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between mb-4">
                <div className="font-display text-2xl tracking-wide text-neutral-50">TOP OFF</div>
                <button onClick={onCancel} className="w-9 h-9 rounded-lg border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-neutral-100">
                  <X size={16} />
                </button>
              </div>

              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-2">REMAINING TODAY</div>
              <div className="grid grid-cols-4 gap-2 mb-4">
                {macroChip('Protein', remaining.protein)}
                {macroChip('Carbs', remaining.carbs)}
                {macroChip('Fat', remaining.fat)}
                {macroChip('Cal', remaining.kcal, '')}
              </div>

              <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 mb-3 text-[11px] text-neutral-400 leading-snug">
                Single-item suggestions sized to hit your protein gap. Other macros ignored — carbs/fat are flex space in a cut.
              </div>

              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">My snack preferences</div>
              <textarea
                value={prefsInput}
                onChange={(e) => setPrefsInput(e.target.value)}
                placeholder="e.g. I like Greek yogurt, protein shakes, jerky, eggs, cottage cheese, nuts. No quinoa, no chickpeas."
                rows={3}
                className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-2 text-neutral-50 text-sm outline-none mb-2"
              />
              <button onClick={savePreferences} className="w-full mb-3 py-1.5 rounded-lg border border-neutral-800 text-neutral-400 uppercase tracking-wider text-[10px] font-semibold hover:bg-neutral-900">
                {prefsSaved ? 'Saved' : 'Save preferences'}
              </button>

              <button onClick={suggest} disabled={loading || remaining.protein <= 0}
                className="w-full py-3 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-sm font-bold hover:bg-orange-400 disabled:opacity-40 flex items-center justify-center gap-2">
                {loading ? (
                  <><div className="w-3 h-3 rounded-full border-2 border-black/30 border-t-black animate-spin" />Thinking…</>
                ) : remaining.protein <= 0 ? (
                  <>Protein goal already hit</>
                ) : (
                  <>Suggest snacks</>
                )}
              </button>

              {error && (
                <div className="mt-3 px-3 py-2 rounded-lg border border-red-900/40 bg-red-950/30 text-red-300 text-xs">
                  {error}
                </div>
              )}

              {suggestions && suggestions.length > 0 && (
                <div className="mt-4 space-y-2">
                  <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">SUGGESTIONS</div>
                  {suggestions.map((s, i) => (
                    <div key={i} className="bg-neutral-900 border border-neutral-800 rounded-lg p-3">
                      <div className="flex items-start justify-between gap-3 mb-1">
                        <div className="min-w-0">
                          <div className="font-bold text-neutral-50 truncate">{s.name}</div>
                          {s.portion && <div className="text-[10px] text-neutral-500 font-mono mt-0.5">{s.portion}</div>}
                        </div>
                        <button onClick={() => addSuggestion(s)} className="shrink-0 px-3 py-1.5 rounded-lg bg-orange-500 text-black text-[10px] uppercase tracking-wider font-bold hover:bg-orange-400">
                          Add
                        </button>
                      </div>
                      <div className="flex gap-3 text-[10px] font-mono mt-1.5">
                        <span className="text-orange-300 font-bold">P {Math.round(s.protein_g || 0)}g</span>
                        <span className="text-neutral-400">C {Math.round(s.carbs_g || 0)}g</span>
                        <span className="text-neutral-400">F {Math.round(s.fat_g || 0)}g</span>
                        <span className="text-neutral-500">· {Math.round(s.kcal || 0)} cal</span>
                      </div>
                      {s.why && <div className="text-[11px] text-neutral-400 mt-1.5 italic">{s.why}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const AddMealView = ({ onSave, onCancel }) => {
      const [mode, setMode] = useState('choose'); // choose | manual | photo-pending | photo-confirm
      const [analyzed, setAnalyzed] = useState(null);
      const [error, setError] = useState(null);
      const cameraRef = React.useRef(null);
      const libraryRef = React.useRef(null);

      const takePhoto = () => { setError(null); cameraRef.current?.click(); };
      const pickFromLibrary = () => { setError(null); libraryRef.current?.click(); };

      const handleFile = async (e) => {
        const file = e.target.files?.[0];
        e.target.value = ''; // allow re-pick same file
        if (!file) return;
        setMode('photo-pending');
        setError(null);
        try {
          const result = await analyzeMealPhoto(file);
          const total = result.total || {};
          setAnalyzed({
            name: result.name || 'Meal',
            kcal: total.kcal || 0,
            protein: total.protein_g || 0,
            carbs: total.carbs_g || 0,
            fat: total.fat_g || 0,
            items: result.items || [],
          });
          setMode('photo-confirm');
        } catch (e) {
          setError(e.message || 'Photo analysis failed');
          setMode('choose');
        }
      };

      const finalSave = (meal) => {
        onSave({
          ...meal,
          source: mode === 'photo-confirm' ? 'photo' : 'manual',
        });
      };

      return (
        <div className="fixed inset-0 bg-black/90 z-40 overflow-y-auto" onClick={onCancel}>
          <div className="min-h-full flex items-start sm:items-center justify-center p-4 pt-10 sm:pt-4">
            <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between mb-5">
                <div className="font-display text-2xl tracking-wide text-neutral-50">ADD MEAL</div>
                <button onClick={onCancel} className="w-9 h-9 rounded-lg border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-neutral-100">
                  <X size={16} />
                </button>
              </div>

              <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={handleFile} className="hidden" />
              <input ref={libraryRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />

              {error && (
                <div className="mb-4 px-3 py-2 rounded-lg border border-red-900/40 bg-red-950/30 text-red-300 text-xs">
                  {error}
                </div>
              )}

              {mode === 'choose' && (
                <div className="space-y-3">
                  <button onClick={takePhoto}
                    className="w-full p-4 rounded-xl border border-neutral-800 hover:border-orange-500/50 bg-gradient-to-br from-neutral-950 to-neutral-900 text-left flex items-center gap-4 active:scale-[0.99]">
                    <div className="w-12 h-12 rounded-lg bg-orange-500/10 border border-orange-500/30 flex items-center justify-center shrink-0">
                      <Camera size={22} className="text-orange-400" />
                    </div>
                    <div>
                      <div className="font-bold text-neutral-50">Take photo</div>
                      <div className="text-xs text-neutral-500 mt-0.5">Use the camera now — AI estimates macros</div>
                    </div>
                  </button>
                  <button onClick={pickFromLibrary}
                    className="w-full p-4 rounded-xl border border-neutral-800 hover:border-orange-500/50 bg-gradient-to-br from-neutral-950 to-neutral-900 text-left flex items-center gap-4 active:scale-[0.99]">
                    <div className="w-12 h-12 rounded-lg bg-orange-500/10 border border-orange-500/30 flex items-center justify-center shrink-0">
                      <Camera size={22} className="text-orange-400" strokeWidth={1.5} />
                    </div>
                    <div>
                      <div className="font-bold text-neutral-50">Choose from library</div>
                      <div className="text-xs text-neutral-500 mt-0.5">Pick an existing photo</div>
                    </div>
                  </button>
                  <button onClick={() => setMode('manual')}
                    className="w-full p-4 rounded-xl border border-neutral-800 hover:border-orange-500/50 bg-gradient-to-br from-neutral-950 to-neutral-900 text-left flex items-center gap-4 active:scale-[0.99]">
                    <div className="w-12 h-12 rounded-lg bg-neutral-900 border border-neutral-800 flex items-center justify-center shrink-0">
                      <Edit2 size={20} className="text-neutral-300" />
                    </div>
                    <div>
                      <div className="font-bold text-neutral-50">Type or describe</div>
                      <div className="text-xs text-neutral-500 mt-0.5">e.g. "4 boiled eggs" → AI estimate, or enter macros directly</div>
                    </div>
                  </button>
                </div>
              )}

              {mode === 'photo-pending' && (
                <div className="py-10 flex flex-col items-center gap-3">

                  <div className="text-sm text-neutral-400 uppercase tracking-widest font-mono">Analyzing photo…</div>
                  <div className="text-xs text-neutral-600">Usually ~5 seconds</div>
                </div>
              )}

              {mode === 'photo-confirm' && analyzed && (
                <div>
                  <div className="text-xs text-neutral-500 mb-3">Review and adjust — tap any number to edit.</div>

              )}

    // ============================================================
    // EDIT MEAL VIEW (for already-logged meals)

    const EditMealView = ({ meal, onSave, onDelete, onCancel }) => {
      return (
        <div className="fixed inset-0 bg-black/90 z-40 overflow-y-auto" onClick={onCancel}>
          <div className="min-h-full flex items-start sm:items-center justify-center p-4 pt-10 sm:pt-4">
            <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5 w-full max-w-md" onClick={(e) => e.stopPropagation()}>

    // ============================================================
    // DIET VIEW
    // ============================================================
    const DietView = ({ state, onBack, onUpdateState }) => {
      const [adding, setAdding] = useState(false);
      const [editing, setEditing] = useState(null); // meal object or null
      const [topOff, setTopOff] = useState(false);

      const today = todayKey();
      const meals = (state.mealsByDate && state.mealsByDate[today]) || [];
      const pace = computeWeeklyPace(state);
      const targets = computeMacroTargets(state.bodyStats, state.oura, pace);
      const totals = sumMeals(meals);
      const remaining = Math.max(0, targets.kcal - totals.kcal);

      const addMeal = (meal) => {
        const id = `m-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
        const entry = { id, ...meal, loggedAt: new Date().toISOString() };
        const list = [...meals, entry];
        onUpdateState({ ...state, mealsByDate: { ...(state.mealsByDate || {}), [today]: list } });
        setAdding(false);
      };
      const saveEdit = (updated) => {
        if (!editing) return;
        const list = meals.map(m => m.id === editing.id ? { ...m, ...updated } : m);
        onUpdateState({ ...state, mealsByDate: { ...(state.mealsByDate || {}), [today]: list } });
        setEditing(null);
      };
      const deleteMeal = () => {
        if (!editing) return;
        const list = meals.filter(m => m.id !== editing.id);
        onUpdateState({ ...state, mealsByDate: { ...(state.mealsByDate || {}), [today]: list } });
        setEditing(null);
      };

      const modeLabel = { cut: 'CUT', maintain: 'MAINTAIN', bulk: 'BULK' }[targets.mode];
      const modeColor = { cut: 'text-orange-400', maintain: 'text-neutral-300', bulk: 'text-green-400' }[targets.mode];

      return (
        <div className="px-5 pt-6 max-w-2xl mx-auto" style={{ paddingBottom: 'calc(11rem + env(safe-area-inset-bottom))' }}>
          <div className="flex items-center justify-between mb-4">
            <div>
              <div className="font-display text-3xl tracking-wide text-neutral-50">DIET</div>
              <div className="text-sm text-neutral-500">
                {new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' })}
              </div>
            </div>
            <div className={`text-xs uppercase tracking-[0.2em] font-mono ${modeColor}`}>
              {modeLabel} · {state.bodyStats?.bodyFatPct || '—'}% → {state.bodyStats?.goalBodyFatPct || '—'}%
            </div>
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="flex items-baseline justify-between mb-1">
              <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono">CALORIES REMAINING</div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-600 font-mono">
                target {targets.kcal}
                {targets.adjustment !== 0 && (
                  <span className={`ml-1 ${targets.adjustment < 0 ? 'text-orange-300' : 'text-blue-300'}`}>
                    ({targets.adjustment > 0 ? '+' : ''}{targets.adjustment} pace)
                  </span>
                )}
              </div>
            </div>
            <div className="flex items-baseline gap-2 mb-5">
              <div className="font-mono text-5xl font-bold text-neutral-50 leading-none">
                {totals.kcal > targets.kcal ? `+${totals.kcal - targets.kcal}` : remaining}
              </div>
              <div className="text-sm text-neutral-500 font-mono">{totals.kcal > targets.kcal ? 'over' : 'cal left'}</div>
            </div>
            <div className="space-y-3">
              <MacroBar label="Calories" current={totals.kcal} target={targets.kcal} unit="" />
              <MacroBar label="Protein" current={totals.protein} target={targets.protein} />
              <MacroBar label="Carbs"   current={totals.carbs}   target={targets.carbs} />
              <MacroBar label="Fat"     current={totals.fat}     target={targets.fat} />
            </div>
            {targets.adjustment !== 0 && (
              <div className="text-[11px] text-neutral-500 mt-3 leading-snug">
                <span className={targets.adjustment < 0 ? 'text-orange-300' : 'text-blue-300'}>
                  Pace adjustment {targets.adjustment > 0 ? '+' : ''}{targets.adjustment} cal
                </span>
                {' '}vs baseline {targets.baseKcal}. {targets.adjustment < 0 ? 'You overshot recently — tighter today.' : 'You undershot recently — extra room today.'}
              </div>
            )}
          </div>

          <PaceCard state={state} onOpenDiet={() => {}} />

          <div className="flex items-center justify-between mb-3">
            <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono">TODAY'S MEALS</div>

          </div>

          {meals.length === 0 ? (
            <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-8 text-center mb-4">
              <Utensils size={28} className="text-neutral-700 mx-auto mb-3" />
              <div className="text-neutral-500 text-sm">No meals logged yet.</div>
              <div className="text-neutral-600 text-xs mt-1">Tap the + button below to add one.</div>
            </div>
          ) : (
            <div className="space-y-2 mb-4">
              {meals.map(m => (
                <button key={m.id} onClick={() => setEditing(m)}
                  className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-lg p-4 hover:border-neutral-700 active:scale-[0.99]">
                  <div className="flex items-start justify-between mb-1.5 gap-3">
                    <div className="min-w-0 flex-1">
                      <div className="font-semibold text-neutral-50 truncate">{m.name}</div>
                      <div className="text-[10px] text-neutral-600 font-mono uppercase tracking-wider mt-0.5">
                        {m.source === 'photo' ? 'Photo' : 'Manual'} · {new Date(m.loggedAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}
                      </div>
                    </div>
                    <div className="font-mono text-orange-400 font-bold text-lg shrink-0">{m.kcal}<span className="text-[10px] text-neutral-500 ml-1">cal</span></div>
                  </div>
                  <div className="flex gap-3 text-[10px] font-mono text-neutral-500 uppercase tracking-wider">
                    <span>P {m.protein}g</span>
                    <span>C {m.carbs}g</span>
                    <span>F {m.fat}g</span>
                  </div>
                </button>
              ))}
            </div>
          )}

          {!state.bodyStats?.lastUpdated && (
            <div className="bg-orange-950/20 border border-orange-900/40 rounded-lg p-3 mb-4 text-xs text-orange-200">
              Set your weight + body fat % in Settings → Body Stats to dial in macro targets.
            </div>
          )}

          <div className="fixed left-0 right-0 px-4 pt-6 pb-3 bg-gradient-to-t from-black via-black/95 to-transparent z-20" style={{ bottom: 'calc(60px + env(safe-area-inset-bottom))' }}>
            <div className="max-w-2xl mx-auto flex gap-2">
              <button onClick={() => setTopOff(true)}
                className="px-4 py-4 rounded-xl font-bold uppercase tracking-[0.1em] text-xs border border-orange-500/40 text-orange-300 hover:bg-orange-500/10 active:scale-[0.99] flex items-center justify-center gap-1.5 shrink-0">
                Top off
              </button>
              <button onClick={() => setAdding(true)}
                className="flex-1 py-4 rounded-xl font-bold uppercase tracking-[0.15em] text-sm bg-orange-500 hover:bg-orange-400 text-black active:scale-[0.99] flex items-center justify-center gap-2 shadow-lg shadow-orange-500/20">
                <Plus size={18} strokeWidth={3} /> Add Meal
              </button>
            </div>
          </div>

          {adding && <AddMealView onSave={addMeal} onCancel={() => setAdding(false)} />}
          {editing && <EditMealView meal={editing} onSave={saveEdit} onDelete={deleteMeal} onCancel={() => setEditing(null)} />}
          {topOff && <TopOffView state={state} onUpdateState={onUpdateState} onSave={(meal) => { addMeal(meal); setTopOff(false); }} onCancel={() => setTopOff(false)} />}
        </div>
      );
    };

    // ============================================================
    // PROGRESS LIST (per-exercise line charts)
    // ============================================================
    const buildExerciseSeries = (history) => {
      const ordered = (history || []).slice().reverse(); // oldest first
      const series = new Map(); // key -> { type, name, points: [{ts, value, label}] }
      ordered.forEach((s) => {
        if (!s || !s.completedAt) return;
        const ts = new Date(s.completedAt).getTime();
        if (!ts) return;
        const amrap = s.mainSets?.find(set => set.isAmrap && set.actualReps);
        if (amrap && s.mainLift && s.mainName) {
          const key = `main:${s.mainLift}`;
          if (!series.has(key)) series.set(key, { type: 'main', name: s.mainName, points: [] });
          series.get(key).points.push({
            ts,
            value: estimate1RM(amrap.weight, amrap.actualReps),
            label: `${amrap.weight}×${amrap.actualReps}`,
          });
        }
        (s.accessories || []).forEach((acc) => {
          const reps = (acc.setData || []).map(x => x.reps).filter(r => r != null);
          if (reps.length === 0) return;
          const topReps = Math.max(...reps);
          let value, label;
          if (acc.isBodyweight) {
            value = topReps;
            label = `${topReps} reps`;
          } else if (acc.isTimed) {
            value = topReps; // seconds
            label = `${topReps}s`;
          } else {
            value = (acc.weight || 0) * topReps;
            label = `${acc.weight}×${topReps}`;
          }
          const key = `acc:${acc.id}`;
          if (!series.has(key)) series.set(key, { type: acc.isBodyweight ? 'bw' : acc.isTimed ? 'timed' : 'acc', name: acc.name, points: [] });
          series.get(key).points.push({ ts, value, label });
        });
      });
      return series;
    };

    const ProgressList = ({ state }) => {
      const series = buildExerciseSeries(state.history);
      const entries = Array.from(series.entries()).filter(([, v]) => v.points.length >= 2);
      if (entries.length === 0) {
        return (
          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-8 text-center">
            <BarChart size={28} className="text-neutral-700 mx-auto mb-3" />
            <div className="text-neutral-500 text-sm">Log at least 2 sessions to see progress charts.</div>
          </div>
        );
      }
      // Order: main lifts first (in DAY_ORDER's lift order), then accessories
      const mainOrder = ['bench', 'squat', 'deadlift'];
      entries.sort(([a], [b]) => {
        const aIsMain = a.startsWith('main:'), bIsMain = b.startsWith('main:');
        if (aIsMain && !bIsMain) return -1;
        if (bIsMain && !aIsMain) return 1;
        if (aIsMain && bIsMain) {
          return mainOrder.indexOf(a.split(':')[1]) - mainOrder.indexOf(b.split(':')[1]);
        }
        return 0;
      });
      return (
        <div className="space-y-3">
          {entries.map(([key, s]) => {
            const pts = s.points;
            const first = pts[0];
            const last = pts[pts.length - 1];
            const delta = last.value - first.value;
            const color = s.type === 'main' ? '#F97316' : s.type === 'bw' ? '#60a5fa' : s.type === 'timed' ? '#a78bfa' : '#84cc16';
            const unit = s.type === 'main' ? 'est 1RM lb'
                       : s.type === 'bw'   ? 'reps'
                       : s.type === 'timed'? 'sec'
                       :                     'lb·reps';
            return (
              <div key={key} className="bg-neutral-950 border border-neutral-800 rounded-xl p-4">
                <div className="flex items-baseline justify-between mb-1 gap-3">
                  <div className="font-bold text-neutral-50 truncate">{s.name}</div>
                  <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono shrink-0">
                    {Math.round(last.value).toLocaleString()} <span className="text-neutral-600">{unit}</span>
                  </div>
                </div>
                <Sparkline points={pts} color={color} height={44} />
                <div className="flex items-center justify-between mt-2 text-[10px] text-neutral-500 font-mono uppercase tracking-wider">
                  <span>{pts.length} sessions</span>
                  <span className={delta > 0 ? 'text-green-400' : delta < 0 ? 'text-red-400' : 'text-neutral-500'}>
                    {delta > 0 ? '+' : ''}{Math.round(delta).toLocaleString()} since first
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ============================================================
    // IRON LOG VIEW (Train / Progress / History sub-tabs)
    // ============================================================
    const IronLogView = ({ state, onStart, onSettings }) => {
      const [sub, setSub] = useState('train'); // train | progress | history
      const [historyFilter, setHistoryFilter] = useState('all');
      const [selected, setSelected] = useState(null);

      if (selected) {
        return <SessionDetailView session={selected} onBack={() => setSelected(null)} />;
      }

      const history = state.history || [];
      const filtered = historyFilter === 'all' ? history : history.filter(s => s.dayId === historyFilter);

      return (
        <div className="px-5 pb-28 pt-6 max-w-2xl mx-auto">
          <div className="flex items-center justify-between mb-4">
            <div className="font-display text-3xl tracking-wide text-neutral-50">IRON LOG</div>
            <div className="text-[10px] uppercase tracking-[0.2em] font-mono text-neutral-500">
              C{state.cycle}·W{state.week} · {WEEK_SCHEMES[state.week].label}
            </div>
          </div>

          <div className="grid grid-cols-3 gap-2 mb-6">
            {[['train', 'Train'], ['progress', 'Progress'], ['history', 'History']].map(([id, label]) => (
              <button key={id} onClick={() => setSub(id)}
                className={`py-2.5 rounded-lg text-xs uppercase tracking-wider font-mono border transition-all ${
                  sub === id ? 'bg-orange-500 text-black border-orange-500 font-bold' : 'bg-neutral-950 text-neutral-400 border-neutral-800 hover:border-neutral-700'
                }`}>{label}</button>
            ))}
          </div>

          {sub === 'train' && (
            <>
              <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono mb-3">THIS WEEK</div>
              <div className="grid grid-cols-2 gap-3 mb-4">
                {DAY_ORDER.map(dayId => {
                  const tpl = DAY_TEMPLATES[dayId];
                  const done = state.completedThisWeek[dayId];
                  return (
                    <button key={dayId} onClick={() => onStart(dayId)}
                      className={`relative text-left p-4 rounded-xl border transition-all active:scale-[0.98] ${
                        done ? 'bg-neutral-950 border-green-900/40' : 'bg-gradient-to-br from-neutral-950 to-neutral-900 border-neutral-800 hover:border-orange-500/50'
                      }`}>
                      {done && (
                        <div className="absolute top-3 right-3 w-6 h-6 rounded-full bg-green-500/20 border border-green-500/40 flex items-center justify-center">
                          <Check size={12} className="text-green-400" strokeWidth={3} />
                        </div>
                      )}
                      <div className="font-display text-2xl tracking-wide leading-none mb-2 text-neutral-50">
                        {tpl.name.split(' ')[0].toUpperCase()}
                      </div>
                      <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">{tpl.mainName}</div>
                      {!done && (
                        <div className="mt-3 text-xs uppercase tracking-wider text-orange-400 font-semibold flex items-center gap-1">
                          Start <ArrowRight size={12} strokeWidth={3} />
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            </>
          )}

          {sub === 'progress' && <ProgressList state={state} />}

          {sub === 'history' && (
            <>
              <div className="flex gap-2 mb-4 flex-wrap">
                {['all', ...DAY_ORDER].map(f => (
                  <button key={f} onClick={() => setHistoryFilter(f)}
                    className={`px-3 py-1.5 rounded-lg text-xs uppercase tracking-wider font-mono border transition-all ${
                      historyFilter === f ? 'bg-orange-500 text-black border-orange-500 font-bold' : 'bg-neutral-950 text-neutral-400 border-neutral-800 hover:border-neutral-700'
                    }`}>
                    {f === 'all' ? 'All' : DAY_TEMPLATES[f].name.split(' ')[0]}
                  </button>
                ))}
              </div>
              {filtered.length === 0 ? (
                <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-8 text-center">
                  <div className="text-neutral-500 text-sm">No sessions yet.</div>
                </div>
              ) : (
                <div className="space-y-2">
                  {filtered.map((s, i) => {
                    const amrap = s.mainSets?.find(set => set.isAmrap && set.actualReps);
                    return (
                      <button key={i} onClick={() => setSelected(s)} className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-lg p-4 hover:border-neutral-700 active:scale-[0.99]">
                        <div className="flex items-start justify-between mb-1 gap-3">
                          <div className="min-w-0">
                            <div className="font-semibold text-neutral-50">{s.name}</div>
                            <div className="text-xs text-neutral-500 font-mono">
                              C{s.cycle}·W{s.week} · {s.completedAt ? new Date(s.completedAt).toLocaleDateString() : ''}
                            </div>
                          </div>
                          {amrap && (
                            <div className="text-right shrink-0">
                              <div className="font-mono text-orange-400 font-bold">{amrap.weight}×{amrap.actualReps}</div>
                              <div className="text-[10px] uppercase tracking-wider text-neutral-500">{s.mainLift}</div>
                            </div>
                          )}
                        </div>
                        <div className="text-xs text-neutral-500 mt-2 flex items-center justify-between">
                          <span>{s.accessories?.length || 0} accessories · {s.mainSets?.filter(x => x.completed).length || 0} main sets</span>
                          <ChevronRight size={14} className="text-neutral-600" />
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </>
          )}
        </div>
      );
    };

    // ============================================================
    // SESSION DETAIL VIEW (drill-down from History)
    // ============================================================
    const SessionDetailView = ({ session, onBack }) => {
      const amrap = session.mainSets?.find(s => s.isAmrap && s.actualReps);
      const e1RM = amrap ? estimate1RM(amrap.weight, amrap.actualReps) : null;
      const completedMain = session.mainSets?.filter(s => s.completed) || [];
      const mainVolume = completedMain.reduce((sum, s) => sum + (s.weight || 0) * (s.actualReps ?? s.targetReps ?? 0), 0);
      const accVolume = (session.accessories || []).reduce((sum, a) => {
        if (a.isBodyweight || a.isTimed) return sum;
        return sum + (a.setData || []).reduce((ss, s) => ss + (a.weight || 0) * (s.reps || 0), 0);
      }, 0);
      const totalVolume = Math.round(mainVolume + accVolume);

      return (
        <div className="px-5 pb-24 pt-6 max-w-2xl mx-auto">
          <button onClick={onBack} className="flex items-center gap-1 text-neutral-400 hover:text-neutral-100 text-sm uppercase tracking-wider mb-6">
            <ChevronLeft size={18} /> History
          </button>
          <div className="font-display text-3xl tracking-wide text-neutral-50 mb-1">{session.name.toUpperCase()}</div>
          <div className="text-sm text-neutral-500 mb-6 font-mono">
            C{session.cycle}·W{session.week} · {session.weekLabel} · {session.completedAt ? new Date(session.completedAt).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : '—'}
          </div>

          <div className="grid grid-cols-3 gap-2 mb-4">
            <div className="bg-neutral-950 border border-neutral-800 rounded-lg p-3">
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Volume</div>
              <div className="font-mono text-lg font-bold text-neutral-50">{totalVolume.toLocaleString()}<span className="text-[10px] text-neutral-500 ml-0.5">lb</span></div>
            </div>
            <div className="bg-neutral-950 border border-neutral-800 rounded-lg p-3">
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">Sets done</div>
              <div className="font-mono text-lg font-bold text-neutral-50">
                {completedMain.length + (session.accessories || []).reduce((s, a) => s + (a.setData || []).filter(x => x.completed).length, 0)}
              </div>
            </div>
            <div className="bg-neutral-950 border border-neutral-800 rounded-lg p-3">
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">e1RM</div>
              <div className="font-mono text-lg font-bold text-orange-400">{e1RM ? `${e1RM}` : '—'}<span className="text-[10px] text-neutral-500 ml-0.5">{e1RM ? 'lb' : ''}</span></div>
            </div>
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-4 mb-4">
            <div className="text-[10px] uppercase tracking-widest text-orange-400 font-semibold mb-1">MAIN LIFT</div>
            <div className="text-xl font-bold text-neutral-50 mb-3">{session.mainName}</div>
            <div className="space-y-2">
              {(session.mainSets || []).map((set, i) => {
                const reps = set.isAmrap ? (set.actualReps ?? (set.completed ? set.targetReps : null)) : (set.completed ? set.targetReps : null);
                const setE1RM = set.isAmrap && set.actualReps ? estimate1RM(set.weight, set.actualReps) : null;
                return (
                  <div key={i} className={`flex items-center px-3 py-3 rounded-lg border ${set.completed ? 'bg-orange-500/5 border-orange-500/30' : 'bg-neutral-900 border-neutral-800 opacity-60'}`}>
                    <div className="w-7 h-7 rounded-full border border-neutral-700 flex items-center justify-center text-xs font-mono text-neutral-400 mr-3 shrink-0">
                      {i + 1}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-mono text-lg font-bold text-neutral-50 leading-tight">
                        {set.weight}<span className="text-xs text-neutral-500 font-normal ml-0.5">lb</span>
                        <span className="text-neutral-600 mx-2">·</span>
                        {reps != null ? <>{reps}<span className="text-xs text-neutral-500 font-normal ml-0.5">reps</span></> : <span className="text-neutral-500 text-sm font-normal">not logged</span>}
                      </div>
                      <div className="text-[10px] uppercase tracking-wider text-neutral-500 mt-0.5">
                        {set.isAmrap ? `AMRAP · target ${set.targetReps}+` : `target ${set.targetReps}`}
                      </div>
                    </div>
                    {setE1RM && (
                      <div className="text-right ml-2">
                        <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">e1RM</div>
                        <div className="font-mono text-sm font-bold text-orange-400">{setE1RM}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {session.accessories && session.accessories.length > 0 && (
            <>
              <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono mb-3">ACCESSORIES</div>
              <div className="space-y-3">
                {session.accessories.map(acc => {
                  const sets = (acc.setData || []).filter(s => s.completed);
                  const unit = acc.isTimed ? 'sec' : 'reps';
                  return (
                    <div key={acc.id} className="bg-neutral-950 border border-neutral-800 rounded-xl p-4">
                      <div className="flex items-baseline justify-between mb-2">
                        <div className="font-bold text-neutral-50">{acc.name}</div>
                        {!acc.isBodyweight && !acc.isTimed && (
                          <div className="font-mono text-sm text-neutral-400">{acc.weight}<span className="text-[10px] text-neutral-500 ml-0.5">lb</span></div>
                        )}
                        {acc.isBodyweight && <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono">bodyweight</div>}
                      </div>
                      {sets.length === 0 ? (
                        <div className="text-xs text-neutral-600 italic">no sets logged</div>
                      ) : (
                        <div className="grid grid-cols-3 gap-2">
                          {(acc.setData || []).map((s, i) => (
                            <div key={i} className={`text-center py-2 rounded border ${s.completed ? 'bg-orange-500/5 border-orange-500/30 text-orange-200' : 'bg-neutral-900 border-neutral-800 text-neutral-600'}`}>
                              <div className="text-[10px] uppercase tracking-wider">Set {i + 1}</div>
                              <div className="font-mono text-base font-bold leading-tight">{s.completed ? s.reps : '—'}</div>
                              <div className="text-[9px] uppercase tracking-wider opacity-70">{unit}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    };

    // ============================================================
    // BODY STATS CARD (in Settings)
    // ============================================================
    const formatRelative = (ts) => {
      if (!ts) return null;
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d}d ago`;
      return new Date(ts).toLocaleDateString();
    };

    const BodyStatsCard = ({ state, onUpdateState }) => {
      const bs = state.bodyStats || defaultBodyStats;
      const [weightStr, setWeightStr] = useState(String(bs.weight));
      const [bfStr, setBfStr] = useState(String(bs.bodyFatPct ?? ''));
      const [saved, setSaved] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [syncMsg, setSyncMsg] = useState(null);

      useEffect(() => {
        setWeightStr(String(bs.weight));
        setBfStr(String(bs.bodyFatPct ?? ''));
      }, [bs.weight, bs.bodyFatPct]);

      // Detect ?withings=connected query param (set by callback redirect) and auto-trigger sync.
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('withings') === 'connected') {
          window.history.replaceState({}, '', window.location.pathname);
          triggerWithingsSync();
        }
      }, []);

      const save = (extra = {}) => {
        const w = parseFloat(weightStr);
        const bf = parseFloat(bfStr);
        if (isNaN(w) || w < 50 || w > 600) return;
        const nextBs = {
          ...bs,
          weight: Math.round(w * 10) / 10,
          bodyFatPct: !isNaN(bf) && bf > 3 && bf < 60 ? Math.round(bf * 10) / 10 : null,
          lastUpdated: new Date().toISOString(),
          ...extra,
        };
        const history = [
          { date: todayKey(), weight: nextBs.weight, bodyFatPct: nextBs.bodyFatPct, source: extra.lastSource || 'manual' },
          ...(state.bodyStatsHistory || []),
        ].slice(0, 365);
        onUpdateState({ ...state, bodyStats: nextBs, bodyStatsHistory: history });
        setSaved(true);
        setTimeout(() => setSaved(false), 1500);
      };

      const updateField = (key, val) => {
        onUpdateState({ ...state, bodyStats: { ...bs, [key]: val } });
      };

      const connectWithings = () => {
        const secret = cloudSync.getSecret();
        if (!secret) { setSyncMsg('Set your sync secret first.'); return; }
        window.location.href = `/api/withings/auth?secret=${encodeURIComponent(secret)}`;
      };

      const [ouraSyncing, setOuraSyncing] = useState(false);
      const [ouraMsg, setOuraMsg] = useState(null);
      const triggerOuraSync = async () => {
        const secret = cloudSync.getSecret();
        if (!secret) { setOuraMsg('Set your sync secret first.'); return; }
        setOuraSyncing(true);
        setOuraMsg(null);
        try {
          const r = await fetch('/api/oura/sync', { headers: { 'x-sync-secret': secret } });
          const j = await r.json();
          if (!r.ok) { setOuraMsg(j.error || `HTTP ${r.status}`); return; }
          onUpdateState({ ...state, oura: j });
          setOuraMsg(`Synced · TDEE ${j.total_burn_7d_avg} cal · readiness ${j.readiness_score_today ?? '—'}`);
        } catch (e) {
          setOuraMsg(String(e.message || e));
        } finally {
          setOuraSyncing(false);
        }
      };

      const triggerWithingsSync = async () => {
        const secret = cloudSync.getSecret();
        if (!secret) { setSyncMsg('Set your sync secret first.'); return; }
        setSyncing(true);
        setSyncMsg(null);
        try {
          const r = await fetch('/api/withings/sync', { headers: { 'x-sync-secret': secret } });
          const j = await r.json();
          if (r.status === 409 || j.error === 'not_connected') {
            setSyncMsg('Not connected yet. Tap Connect Withings.');
            return;
          }

          ].slice(0, 365);
          onUpdateState({ ...state, bodyStats: nextBs, bodyStatsHistory: history });

        } catch (e) {

    // ============================================================
