<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Iron Log</title>

  <!-- PWA / iOS Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20180%20180'%3E%3Crect%20width='180'%20height='180'%20rx='40'%20fill='%23000'/%3E%3Crect%20x='34'%20y='34'%20width='112'%20height='112'%20rx='24'%20fill='%23F97316'/%3E%3Cpath%20d='M70%2070l40%2040M120%20120l5%205M55%2055l5%205M105%20130l20-20M55%2070l20-20M60%2080l35-35M125%20120l35-35'%20stroke='%23000'%20stroke-width='10'%20stroke-linecap='round'%20fill='none'/%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      background: #000;
      color: #fafafa;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .font-display { font-family: 'Anton', sans-serif; font-weight: 400; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    button { -webkit-tap-highlight-color: transparent; }
    /* Initial loader */
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #000; color: #525252; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      z-index: 100;
    }
    #loader.hide { display: none; }
  </style>
</head>
<body>
  <div id="loader">Loading…</div>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    // ============================================================
    // ICONS (inline SVG, mimics lucide)
    // ============================================================
    const Icon = ({ children, size = 18, strokeWidth = 2, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth}
        strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Dumbbell = (p) => <Icon {...p}>
      <path d="M14.4 14.4 9.6 9.6"/>
      <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/>
      <path d="m21.5 21.5-1.4-1.4"/>
      <path d="M3.9 3.9 2.5 2.5"/>
      <path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/>
    </Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Minus = (p) => <Icon {...p}><path d="M5 12h14"/></Icon>;
    const Flame = (p) => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
    const ArrowUp = (p) => <Icon {...p}><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></Icon>;
    const ArrowRight = (p) => <Icon {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
    const Award = (p) => <Icon {...p}><circle cx="12" cy="8" r="6"/><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/></Icon>;
    const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
    const History = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Utensils = (p) => <Icon {...p}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></Icon>;
    const Camera = (p) => <Icon {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></Icon>;
    const Edit2 = (p) => <Icon {...p}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></Icon>;
    const Trash = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
    const Loader = (p) => <Icon {...p}><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></Icon>;

    // ============================================================
    // PROGRAM DEFINITIONS
    // ============================================================
    const round5 = (n) => Math.round(n / 5) * 5;

    const WEEK_SCHEMES = {
      1: { label: '5s WEEK', sets: [
        { pct: 0.65, reps: 5, isAmrap: false },
        { pct: 0.75, reps: 5, isAmrap: false },
        { pct: 0.85, reps: 5, isAmrap: true, minReps: 5 },
      ]},
      2: { label: '3s WEEK', sets: [
        { pct: 0.70, reps: 3, isAmrap: false },
        { pct: 0.80, reps: 3, isAmrap: false },
        { pct: 0.90, reps: 3, isAmrap: true, minReps: 3 },
      ]},
      3: { label: 'PR WEEK', sets: [
        { pct: 0.75, reps: 5, isAmrap: false },
        { pct: 0.85, reps: 3, isAmrap: false },
        { pct: 0.95, reps: 1, isAmrap: true, minReps: 1 },
      ]},
      4: { label: 'DELOAD', sets: [
        { pct: 0.40, reps: 5, isAmrap: false },
        { pct: 0.50, reps: 5, isAmrap: false },
        { pct: 0.60, reps: 5, isAmrap: false },
      ]},
    };

    const ACCESSORIES = {
      'incline-db':       { name: 'Incline Dumbbell Press', sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 50 },
      'close-grip':       { name: 'Close-Grip Bench Press', sets: 3, repsLow: 6,  repsHigh: 8,  inc: 5,  startWeight: 135 },
      'tricep-ext-tonal': { name: 'Tricep Extension (Tonal)', sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 50 },
      'decline-fly-tonal':{ name: 'Decline Chest Fly (Tonal)', sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 40 },
      'goblet-squat':     { name: 'Goblet Squat',           sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 50 },
      'lat-pulldown':     { name: 'Lat Pulldown',           sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 120 },
      'db-ohp':           { name: 'Dumbbell Overhead Press',sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 35 },
      'plank':            { name: 'Plank',                  sets: 3, repsLow: 30, repsHigh: 60, inc: 0,  startWeight: 0, isTimed: true },
      'romanian-dl':      { name: 'Romanian Deadlift',      sets: 3, repsLow: 8,  repsHigh: 10, inc: 10, startWeight: 135 },
      'leg-press':        { name: 'Leg Press',              sets: 3, repsLow: 10, repsHigh: 12, inc: 10, startWeight: 200 },
      'leg-curls':        { name: 'Lying Leg Curls',        sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 80 },
      'calf-raises':      { name: 'Standing Calf Raises',   sets: 3, repsLow: 12, repsHigh: 15, inc: 10, startWeight: 100 },
      'leg-raises':       { name: 'Hanging Leg Raises',     sets: 3, repsLow: 10, repsHigh: 15, inc: 0,  startWeight: 0, isBodyweight: true },
      'pull-ups':         { name: 'Pull-Ups',               sets: 3, repsLow: 5,  repsHigh: 10, inc: 0,  startWeight: 0, isBodyweight: true },
      'barbell-rows':     { name: 'Barbell Rows',           sets: 3, repsLow: 8,  repsHigh: 10, inc: 5,  startWeight: 135 },
      'lat-pulldown-back':{ name: 'Lat Pulldown',           sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 120 },
      'face-pulls':       { name: 'Face Pulls',             sets: 3, repsLow: 12, repsHigh: 15, inc: 5,  startWeight: 40 },
      'bicep-curls':      { name: 'Dumbbell Bicep Curls',   sets: 3, repsLow: 10, repsHigh: 12, inc: 5,  startWeight: 25 },
    };

    const DAY_TEMPLATES = {
      chest:    { id: 'chest',    name: 'Chest Day',     mainLift: 'bench',    mainName: 'Bench Press',          isVolume: false, accessories: ['incline-db', 'close-grip', 'tricep-ext-tonal', 'decline-fly-tonal'] },
      fullbody: { id: 'fullbody', name: 'Full Body Day', mainLift: 'bench',    mainName: 'Bench Press (Volume)', isVolume: true,  accessories: ['goblet-squat', 'lat-pulldown', 'db-ohp', 'plank'] },
      legs:     { id: 'legs',     name: 'Leg Day',       mainLift: 'squat',    mainName: 'Back Squat',           isVolume: false, accessories: ['romanian-dl', 'leg-press', 'leg-curls', 'calf-raises', 'leg-raises'] },
      back:     { id: 'back',     name: 'Back Day',      mainLift: 'deadlift', mainName: 'Deadlift',             isVolume: false, accessories: ['pull-ups', 'barbell-rows', 'lat-pulldown-back', 'face-pulls', 'bicep-curls'] },
    };
    const DAY_ORDER = ['chest', 'fullbody', 'legs', 'back'];

    // ============================================================
    // SESSION BUILDING
    // ============================================================
    const buildMainSets = (tm, week, isVolume) => {
      if (isVolume) {
        const isDeload = week === 4;
        const pct = isDeload ? 0.50 : 0.60;
        const count = isDeload ? 3 : 5;
        const w = round5(tm * pct);
        return Array.from({ length: count }, (_, i) => ({
          id: `main-${i}`, weight: w, targetReps: 5, isAmrap: false, completed: false, actualReps: null
        }));
      }
      return WEEK_SCHEMES[week].sets.map((s, i) => ({
        id: `main-${i}`, weight: round5(tm * s.pct), targetReps: s.reps,
        isAmrap: s.isAmrap, minReps: s.minReps, completed: false, actualReps: null
      }));
    };

    const buildAccessory = (id, log) => {
      const def = ACCESSORIES[id];
      const last = log[id] || { weight: def.startWeight, hitTopOnAllSets: false };
      const suggested = last.hitTopOnAllSets ? last.weight + def.inc : last.weight;
      return {
        id, name: def.name, sets: def.sets, repsLow: def.repsLow, repsHigh: def.repsHigh, inc: def.inc,
        isTimed: def.isTimed, isBodyweight: def.isBodyweight,
        weight: suggested, lastWeight: last.weight,
        progressionHint: last.hitTopOnAllSets ? `+${def.inc} lb from last time` : null,
        setData: Array.from({ length: def.sets }, (_, i) => ({ id: `${id}-${i}`, reps: null, completed: false })),
      };
    };

    const buildSession = (dayId, state) => {
      const tpl = DAY_TEMPLATES[dayId];
      const tm = state.trainingMaxes[tpl.mainLift];
      return {
        dayId, name: tpl.name, cycle: state.cycle, week: state.week,
        weekLabel: WEEK_SCHEMES[state.week].label,
        mainLift: tpl.mainLift, mainName: tpl.mainName, isVolume: tpl.isVolume,
        mainSets: buildMainSets(tm, state.week, tpl.isVolume),
        accessories: tpl.accessories.map(id => buildAccessory(id, state.accessoryLog)),
      };
    };

    // ============================================================
    // PROGRESSION
    // ============================================================
    const finishSession = (state, completed) => {
      const newLog = { ...state.accessoryLog };
      completed.accessories.forEach(acc => {
        const def = ACCESSORIES[acc.id];
        const reps = acc.setData.map(s => s.reps).filter(r => r != null);
        const hitTop = reps.length === acc.sets && reps.every(r => r >= def.repsHigh);
        newLog[acc.id] = { weight: acc.weight, hitTopOnAllSets: hitTop, lastReps: reps };
      });
      const done = { ...state.completedThisWeek, [completed.dayId]: true };
      let { cycle, week, trainingMaxes } = state;
      let newDone = done;
      if (Object.values(done).every(v => v)) {
        newDone = { chest: false, fullbody: false, legs: false, back: false };
        if (week === 4) {
          week = 1; cycle += 1;
          trainingMaxes = { bench: trainingMaxes.bench + 5, squat: trainingMaxes.squat + 10, deadlift: trainingMaxes.deadlift + 10 };
        } else week += 1;
      }
      const newHistory = [{ ...completed, completedAt: new Date().toISOString() }, ...(state.history || [])].slice(0, 200);
      return { ...state, cycle, week, trainingMaxes, accessoryLog: newLog, completedThisWeek: newDone, history: newHistory, activeSession: null };
    };

    const estimate1RM = (w, r) => (!w || !r) ? null : Math.round(w * (1 + r / 30));
    const getBestE1RM = (history, lift) => {
      if (!history) return null;
      let best = 0;
      history.forEach(s => {
        if (s.mainLift !== lift || s.isVolume) return;
        s.mainSets?.forEach(set => {
          if (set.isAmrap && set.actualReps && set.weight) {
            const e = estimate1RM(set.weight, set.actualReps);
            if (e > best) best = e;
          }
        });
      });
      return best || null;
    };

    // ============================================================
    // STORAGE (localStorage)
    // ============================================================
    const STORAGE_KEY = 'iron-log:v2';
    const SECRET_KEY = 'iron-log:syncSecret';
    const defaultBodyStats = {
      weight: 185, bodyFatPct: 18, goalBodyFatPct: 15,
      height: 71, age: 45, sex: 'male', activityLevel: 'active',
      lastUpdated: null,
    };
    const defaultState = {
      // Calibrated 2026-05: bench 1RM 225, squat 155x5 (~181 e1RM), DL 165x10 hex (~220 e1RM).
      trainingMaxes: { bench: 200, squat: 165, deadlift: 200 },
      cycle: 1, week: 1,
      completedThisWeek: { chest: false, fullbody: false, legs: false, back: false },
      accessoryLog: {}, history: [], activeSession: null,
      shareToken: null,
      bodyStats: defaultBodyStats,
      bodyStatsHistory: [], // [{ date, weight, bodyFatPct, source }]
      mealsByDate: {}, // 'YYYY-MM-DD': [{ id, name, items, kcal, protein, carbs, fat, source, loggedAt }]
    };

    // ============================================================
    // DIET / MACRO TARGETS
    // ============================================================
    const ACTIVITY_MULTIPLIERS = {
      sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, very_active: 1.9,
    };
    const ACTIVITY_LABELS = {
      sedentary: 'Sedentary', light: 'Light', moderate: 'Moderate', active: 'Active', very_active: 'Very Active',
    };

    // Katch-McArdle if BF% known, else Mifflin-St Jeor. Then activity-adjusted, then
    // shifted by ±300/±200 cal based on current vs goal BF.
    const computeMacroTargets = (bs) => {
      const stats = { ...defaultBodyStats, ...bs };
      const weightKg = stats.weight * 0.4536;
      const heightCm = stats.height * 2.54;
      let bmr;
      if (stats.bodyFatPct && stats.bodyFatPct > 3 && stats.bodyFatPct < 60) {
        const leanKg = weightKg * (1 - stats.bodyFatPct / 100);
        bmr = 370 + 21.6 * leanKg;
      } else {
        bmr = 10 * weightKg + 6.25 * heightCm - 5 * stats.age + (stats.sex === 'female' ? -161 : 5);
      }
      const tdee = bmr * (ACTIVITY_MULTIPLIERS[stats.activityLevel] || 1.55);
      const bfDelta = (stats.bodyFatPct || 18) - (stats.goalBodyFatPct || 15);
      let kcal, proteinPerLb, mode;
      if (bfDelta > 1) { kcal = tdee - 300; proteinPerLb = 1.15; mode = 'cut'; }
      else if (bfDelta < -1) { kcal = tdee + 200; proteinPerLb = 1.0; mode = 'bulk'; }
      else { kcal = tdee; proteinPerLb = 1.05; mode = 'maintain'; }
      const protein = Math.round(stats.weight * proteinPerLb);
      const fat = Math.round(stats.weight * 0.4);
      const carbCal = Math.max(0, kcal - protein * 4 - fat * 9);
      const carbs = Math.round(carbCal / 4);
      return {
        kcal: Math.round(kcal), protein, fat, carbs,
        maintenance: Math.round(tdee), bmr: Math.round(bmr), mode,
      };
    };

    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const sumMeals = (meals) => {
      const t = { kcal: 0, protein: 0, carbs: 0, fat: 0 };
      (meals || []).forEach(m => {
        t.kcal += m.kcal || 0;
        t.protein += m.protein || 0;
        t.carbs += m.carbs || 0;
        t.fat += m.fat || 0;
      });
      return t;
    };

    const fileToBase64 = (file) => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => {
        const s = r.result;
        const comma = s.indexOf(',');
        res({ data: s.slice(comma + 1), mediaType: file.type || 'image/jpeg' });
      };
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const analyzeMealPhoto = async (file) => {
      const { data, mediaType } = await fileToBase64(file);
      return callMealAPI({ imageBase64: data, mediaType });
    };

    const analyzeMealText = async (description) => {
      if (!description || !description.trim()) throw new Error('Description required');
      return callMealAPI({ description: description.trim() });
    };

    const callMealAPI = async (body) => {
      const secret = cloudSync.getSecret();
      const r = await fetch('/api/meal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...(secret ? { 'x-sync-secret': secret } : {}) },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        throw new Error(j.error || `HTTP ${r.status}`);
      }
      return r.json();
    };
    const loadState = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          const tm = parsed.trainingMaxes;
          if (tm && tm.bench === 230 && tm.squat === 250 && tm.deadlift === 295) {
            parsed.trainingMaxes = { bench: 200, squat: 165, deadlift: 200 };
          }
          return {
            ...defaultState,
            ...parsed,
            bodyStats: { ...defaultBodyStats, ...(parsed.bodyStats || {}) },
            mealsByDate: parsed.mealsByDate || {},
            bodyStatsHistory: parsed.bodyStatsHistory || [],
          };
        }
      } catch (e) {}
      return defaultState;
    };
    const saveState = (s) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) { console.error(e); }
    };

    // ============================================================
    // CLOUD SYNC (Vercel KV via /api/state)
    // ============================================================
    const cloudSync = (() => {
      let saveTimer = null;
      let lastSavedJson = '';
      let listener = null;

      const getSecret = () => {
        try { return localStorage.getItem(SECRET_KEY) || null; } catch { return null; }
      };
      const setSecret = (s) => {
        try {
          if (s) localStorage.setItem(SECRET_KEY, s);
          else localStorage.removeItem(SECRET_KEY);
          lastSavedJson = '';
        } catch (e) { console.error(e); }
      };

      const pull = async () => {
        const secret = getSecret();
        if (!secret) return { state: null, status: 'off' };
        try {
          const r = await fetch('/api/state', { headers: { 'x-sync-secret': secret }, cache: 'no-store' });
          if (r.status === 401) return { state: null, status: 'unauthorized' };
          if (!r.ok) return { state: null, status: 'error' };
          const data = await r.json();
          return { state: data.state, status: 'ok' };
        } catch {
          return { state: null, status: 'error' };
        }
      };

      const push = async (state) => {
        const secret = getSecret();
        if (!secret) return 'off';
        const payload = JSON.stringify(state);
        try {
          const r = await fetch('/api/state', {
            method: 'POST',
            headers: { 'x-sync-secret': secret, 'Content-Type': 'application/json' },
            body: payload,
          });
          if (r.status === 401) return 'unauthorized';
          if (!r.ok) return 'error';
          lastSavedJson = payload;
          return 'synced';
        } catch {
          return 'error';
        }
      };

      const scheduleSave = (state) => {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          const secret = getSecret();
          if (!secret) { listener && listener('off'); return; }
          const payload = JSON.stringify(state);
          if (payload === lastSavedJson) { listener && listener('synced'); return; }
          listener && listener('syncing');
          const status = await push(state);
          listener && listener(status);
        }, 1500);
      };

      const onStatus = (fn) => { listener = fn; };

      return { getSecret, setSecret, pull, push, scheduleSave, onStatus };
    })();

    // Cryptographically random URL-safe token, ~22 chars.
    const genShareToken = () => {
      const bytes = new Uint8Array(16);
      (window.crypto || window.msCrypto).getRandomValues(bytes);
      return btoa(String.fromCharCode(...bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    };

    // ============================================================

      return (

            <div className="text-sm text-neutral-400 mb-4">{subtitle}</div>
            <input type="number" autoFocus inputMode="numeric" value={val}

              className="w-full bg-neutral-900 border-2 border-neutral-800 focus:border-orange-500 rounded-lg px-4 py-4 text-4xl font-mono font-bold text-center text-neutral-50 outline-none"

    // ============================================================

    // ============================================================

    const AccessoryCard = ({ ex, onUpdate }) => {

      const logAmrap = (id, reps) => setSession(p => ({ ...p, mainSets: p.mainSets.map(s => s.id === id ? { ...s, completed: true, actualReps: reps } : s) }));

      const pct = target > 0 ? Math.min(100, (current / target) * 100) : 0;
      const remaining = Math.max(0, target - current);
      const over = current > target;
      const accentBg = over ? 'bg-red-500' : (accent === 'orange' ? 'bg-orange-500' : `bg-${accent}-500`);
      const accentText = over ? 'text-red-400' : (accent === 'orange' ? 'text-orange-400' : `text-${accent}-400`);
      return (
        <div>
          <div className="flex items-baseline justify-between mb-1.5">
            <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono">{label}</div>
            <div className="font-mono text-sm">

              <span className="text-neutral-500"> / {target}{unit}</span>
              <span className={`ml-2 text-[10px] ${accentText}`}>
                {over ? `+${Math.round(current - target)} over` : `${Math.round(remaining)} left`}

    // ============================================================
    const MealEditForm = ({ initial, onSave, onCancel, photoPending = false, savingLabel = 'Log meal', allowEstimate = true }) => {
      const [name, setName] = useState(initial?.name || '');
      const [kcal, setKcal] = useState(initial?.kcal ?? '');
      const [protein, setProtein] = useState(initial?.protein ?? '');
      const [carbs, setCarbs] = useState(initial?.carbs ?? '');
      const [fat, setFat] = useState(initial?.fat ?? '');
      const [items, setItems] = useState(initial?.items || null);
      const [estimating, setEstimating] = useState(false);
      const [estimateError, setEstimateError] = useState(null);

      useEffect(() => {
        if (initial) {
          setName(initial.name || '');
          setKcal(initial.kcal ?? '');
          setProtein(initial.protein ?? '');
          setCarbs(initial.carbs ?? '');
          setFat(initial.fat ?? '');
          setItems(initial.items || null);
        }
      }, [initial]);

      const submit = () => {
        const n = (name || '').trim() || 'Meal';
        onSave({
          name: n,
          kcal: parseInt(kcal, 10) || 0,
          protein: parseInt(protein, 10) || 0,
          carbs: parseInt(carbs, 10) || 0,
          fat: parseInt(fat, 10) || 0,
          items: items || null,
        });
      };

      const estimateFromName = async () => {
        const desc = (name || '').trim();
        if (!desc) { setEstimateError('Type the meal first, e.g. "4 boiled eggs"'); return; }
        setEstimating(true);
        setEstimateError(null);
        try {
          const result = await analyzeMealText(desc);
          const total = result.total || {};
          if (result.name) setName(result.name);
          setKcal(String(total.kcal || 0));
          setProtein(String(total.protein_g || 0));
          setCarbs(String(total.carbs_g || 0));
          setFat(String(total.fat_g || 0));
          setItems(result.items || null);
        } catch (e) {
          setEstimateError(e.message || 'Estimate failed');
        } finally {
          setEstimating(false);
        }
      };

      const numField = (label, val, onChange, hint) => (
        <div>
          <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">{label}</div>
          <input type="number" inputMode="numeric" value={val} onChange={(e) => onChange(e.target.value)}
            className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-3 text-neutral-50 font-mono text-xl font-bold text-center outline-none" />
          {hint && <div className="text-[9px] text-neutral-600 mt-1 text-center">{hint}</div>}
        </div>
      );

      return (
        <div>
          <div className="mb-3">
            <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">Meal</div>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)}
              placeholder="e.g. 4 boiled eggs"
              className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-3 text-neutral-50 outline-none" />
          </div>
          {allowEstimate && (
            <button onClick={estimateFromName} disabled={estimating || photoPending}
              className="w-full mb-3 py-2.5 rounded-lg border border-dashed border-orange-500/40 text-orange-300 text-xs uppercase tracking-wider font-semibold hover:bg-orange-500/5 active:scale-[0.99] disabled:opacity-40 flex items-center justify-center gap-2">
              {estimating ? (
                <><div className="w-3 h-3 rounded-full border-2 border-orange-500/30 border-t-orange-500 animate-spin" />Estimating…</>
              ) : (
                <>Estimate macros from name</>
              )}
            </button>
          )}
          {estimateError && (
            <div className="mb-3 px-3 py-2 rounded-lg border border-red-900/40 bg-red-950/30 text-red-300 text-[11px]">{estimateError}</div>
          )}
          <div className="grid grid-cols-4 gap-2 mb-4">
            {numField('Cal', kcal, setKcal)}
            {numField('Pro', protein, setProtein, 'g')}
            {numField('Carb', carbs, setCarbs, 'g')}
            {numField('Fat', fat, setFat, 'g')}
          </div>
          {items && items.length > 0 && (
            <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3 mb-4">
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-2">Identified items</div>
              {items.map((it, i) => (
                <div key={i} className="text-xs text-neutral-300 flex justify-between py-0.5">
                  <span>{it.food}{it.portion ? ` · ${it.portion}` : ''}</span>
                  <span className="font-mono text-neutral-500">{it.kcal} cal</span>
                </div>
              ))}
            </div>
          )}
          <div className="flex gap-2">
            <button onClick={onCancel} disabled={photoPending}
              className="flex-1 py-3 rounded-lg border border-neutral-800 text-neutral-400 uppercase tracking-wider text-sm font-semibold hover:bg-neutral-900 disabled:opacity-40">
              Cancel
            </button>
            <button onClick={submit} disabled={photoPending}
              className="flex-1 py-3 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-sm font-bold hover:bg-orange-400 disabled:opacity-40">
              {savingLabel}
            </button>
          </div>
        </div>
      );
    };

    // ============================================================
    // ADD MEAL VIEW
    // ============================================================
    const AddMealView = ({ onSave, onCancel }) => {
      const [mode, setMode] = useState('choose'); // choose | manual | photo-pending | photo-confirm
      const [analyzed, setAnalyzed] = useState(null);
      const [error, setError] = useState(null);
      const cameraRef = React.useRef(null);
      const libraryRef = React.useRef(null);

      const takePhoto = () => { setError(null); cameraRef.current?.click(); };
      const pickFromLibrary = () => { setError(null); libraryRef.current?.click(); };

      const handleFile = async (e) => {
        const file = e.target.files?.[0];
        e.target.value = ''; // allow re-pick same file
        if (!file) return;
        setMode('photo-pending');
        setError(null);
        try {
          const result = await analyzeMealPhoto(file);
          const total = result.total || {};
          setAnalyzed({
            name: result.name || 'Meal',
            kcal: total.kcal || 0,
            protein: total.protein_g || 0,
            carbs: total.carbs_g || 0,
            fat: total.fat_g || 0,
            items: result.items || [],
          });
          setMode('photo-confirm');
        } catch (e) {
          setError(e.message || 'Photo analysis failed');
          setMode('choose');
        }
      };

      const finalSave = (meal) => {
        onSave({
          ...meal,
          source: mode === 'photo-confirm' ? 'photo' : 'manual',
        });
      };

      return (
        <div className="fixed inset-0 bg-black/90 z-40 overflow-y-auto" onClick={onCancel}>
          <div className="min-h-full flex items-start sm:items-center justify-center p-4 pt-10 sm:pt-4">
            <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between mb-5">
                <div className="font-display text-2xl tracking-wide text-neutral-50">ADD MEAL</div>
                <button onClick={onCancel} className="w-9 h-9 rounded-lg border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-neutral-100">
                  <X size={16} />
                </button>
              </div>

              <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={handleFile} className="hidden" />
              <input ref={libraryRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />

              {error && (
                <div className="mb-4 px-3 py-2 rounded-lg border border-red-900/40 bg-red-950/30 text-red-300 text-xs">
                  {error}
                </div>
              )}

              {mode === 'choose' && (
                <div className="space-y-3">
                  <button onClick={takePhoto}
                    className="w-full p-4 rounded-xl border border-neutral-800 hover:border-orange-500/50 bg-gradient-to-br from-neutral-950 to-neutral-900 text-left flex items-center gap-4 active:scale-[0.99]">
                    <div className="w-12 h-12 rounded-lg bg-orange-500/10 border border-orange-500/30 flex items-center justify-center shrink-0">
                      <Camera size={22} className="text-orange-400" />
                    </div>
                    <div>
                      <div className="font-bold text-neutral-50">Take photo</div>
                      <div className="text-xs text-neutral-500 mt-0.5">Use the camera now — AI estimates macros</div>
                    </div>
                  </button>
                  <button onClick={pickFromLibrary}
                    className="w-full p-4 rounded-xl border border-neutral-800 hover:border-orange-500/50 bg-gradient-to-br from-neutral-950 to-neutral-900 text-left flex items-center gap-4 active:scale-[0.99]">
                    <div className="w-12 h-12 rounded-lg bg-orange-500/10 border border-orange-500/30 flex items-center justify-center shrink-0">
                      <Camera size={22} className="text-orange-400" strokeWidth={1.5} />
                    </div>
                    <div>
                      <div className="font-bold text-neutral-50">Choose from library</div>
                      <div className="text-xs text-neutral-500 mt-0.5">Pick an existing photo</div>
                    </div>
                  </button>
                  <button onClick={() => setMode('manual')}
                    className="w-full p-4 rounded-xl border border-neutral-800 hover:border-orange-500/50 bg-gradient-to-br from-neutral-950 to-neutral-900 text-left flex items-center gap-4 active:scale-[0.99]">
                    <div className="w-12 h-12 rounded-lg bg-neutral-900 border border-neutral-800 flex items-center justify-center shrink-0">
                      <Edit2 size={20} className="text-neutral-300" />
                    </div>
                    <div>
                      <div className="font-bold text-neutral-50">Type or describe</div>
                      <div className="text-xs text-neutral-500 mt-0.5">e.g. "4 boiled eggs" → AI estimate, or enter macros directly</div>
                    </div>
                  </button>
                </div>
              )}

              {mode === 'photo-pending' && (
                <div className="py-10 flex flex-col items-center gap-3">
                  <div className="w-12 h-12 rounded-full border-2 border-orange-500/30 border-t-orange-500 animate-spin" />
                  <div className="text-sm text-neutral-400 uppercase tracking-widest font-mono">Analyzing photo…</div>
                  <div className="text-xs text-neutral-600">Usually ~5 seconds</div>
                </div>
              )}

              {mode === 'photo-confirm' && analyzed && (
                <div>
                  <div className="text-xs text-neutral-500 mb-3">Review and adjust — tap any number to edit.</div>
                  <MealEditForm initial={analyzed} onSave={finalSave} onCancel={() => setMode('choose')} savingLabel="Log meal" />
                </div>
              )}

              {mode === 'manual' && (
                <MealEditForm initial={{}} onSave={finalSave} onCancel={() => setMode('choose')} savingLabel="Log meal" />
              )}
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // EDIT MEAL VIEW (for already-logged meals)
    // ============================================================
    const EditMealView = ({ meal, onSave, onDelete, onCancel }) => {
      return (
        <div className="fixed inset-0 bg-black/90 z-40 overflow-y-auto" onClick={onCancel}>
          <div className="min-h-full flex items-start sm:items-center justify-center p-4 pt-10 sm:pt-4">
            <div className="bg-neutral-950 border border-neutral-800 rounded-2xl p-5 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between mb-5">
                <div className="font-display text-2xl tracking-wide text-neutral-50">EDIT MEAL</div>
                <button onClick={onCancel} className="w-9 h-9 rounded-lg border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-neutral-100">
                  <X size={16} />
                </button>
              </div>
              <MealEditForm initial={meal} onSave={onSave} onCancel={onCancel} savingLabel="Save" />
              <button onClick={onDelete}
                className="w-full mt-3 py-3 rounded-lg border border-red-900/40 text-red-400 uppercase tracking-wider text-sm font-semibold hover:bg-red-950/30 flex items-center justify-center gap-2">
                <Trash size={14} /> Delete meal
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // DIET VIEW
    // ============================================================
    const DietView = ({ state, onBack, onUpdateState }) => {
      const [adding, setAdding] = useState(false);
      const [editing, setEditing] = useState(null); // meal object or null

      const today = todayKey();
      const meals = (state.mealsByDate && state.mealsByDate[today]) || [];
      const targets = computeMacroTargets(state.bodyStats);
      const totals = sumMeals(meals);
      const remaining = Math.max(0, targets.kcal - totals.kcal);

      const addMeal = (meal) => {
        const id = `m-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
        const entry = { id, ...meal, loggedAt: new Date().toISOString() };
        const list = [...meals, entry];
        onUpdateState({ ...state, mealsByDate: { ...(state.mealsByDate || {}), [today]: list } });
        setAdding(false);
      };
      const saveEdit = (updated) => {
        if (!editing) return;
        const list = meals.map(m => m.id === editing.id ? { ...m, ...updated } : m);
        onUpdateState({ ...state, mealsByDate: { ...(state.mealsByDate || {}), [today]: list } });
        setEditing(null);
      };
      const deleteMeal = () => {
        if (!editing) return;
        const list = meals.filter(m => m.id !== editing.id);
        onUpdateState({ ...state, mealsByDate: { ...(state.mealsByDate || {}), [today]: list } });
        setEditing(null);
      };

      const modeLabel = { cut: 'CUT', maintain: 'MAINTAIN', bulk: 'BULK' }[targets.mode];
      const modeColor = { cut: 'text-orange-400', maintain: 'text-neutral-300', bulk: 'text-green-400' }[targets.mode];

      return (
        <div className="px-5 pb-32 pt-6 max-w-2xl mx-auto">
          <div className="flex items-center justify-between mb-6">
            <button onClick={onBack} className="flex items-center gap-1 text-neutral-400 hover:text-neutral-100 text-sm uppercase tracking-wider">
              <ChevronLeft size={18} /> Back
            </button>
            <div className={`text-xs uppercase tracking-[0.2em] font-mono ${modeColor}`}>
              {modeLabel} · {state.bodyStats?.bodyFatPct || '—'}% → {state.bodyStats?.goalBodyFatPct || '—'}%
            </div>
          </div>

          <div className="font-display text-4xl tracking-wide text-neutral-50 mb-1">DIET</div>
          <div className="text-sm text-neutral-500 mb-6">
            {new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' })}
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="flex items-baseline justify-between mb-1">
              <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono">CALORIES REMAINING</div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-600 font-mono">target {targets.kcal}</div>
            </div>
            <div className="flex items-baseline gap-2 mb-5">
              <div className="font-mono text-5xl font-bold text-neutral-50 leading-none">
                {totals.kcal > targets.kcal ? `+${totals.kcal - targets.kcal}` : remaining}
              </div>
              <div className="text-sm text-neutral-500 font-mono">{totals.kcal > targets.kcal ? 'over' : 'cal left'}</div>
            </div>
            <div className="space-y-3">
              <MacroBar label="Calories" current={totals.kcal} target={targets.kcal} unit="" />
              <MacroBar label="Protein" current={totals.protein} target={targets.protein} />
              <MacroBar label="Carbs"   current={totals.carbs}   target={targets.carbs} />
              <MacroBar label="Fat"     current={totals.fat}     target={targets.fat} />
            </div>
          </div>

          <div className="flex items-center justify-between mb-3">
            <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono">TODAY'S MEALS</div>
            <div className="text-[10px] uppercase tracking-wider text-neutral-600 font-mono">{meals.length} logged</div>
          </div>

          {meals.length === 0 ? (
            <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-8 text-center mb-4">
              <Utensils size={28} className="text-neutral-700 mx-auto mb-3" />
              <div className="text-neutral-500 text-sm">No meals logged yet.</div>
              <div className="text-neutral-600 text-xs mt-1">Tap the + button below to add one.</div>
            </div>
          ) : (
            <div className="space-y-2 mb-4">
              {meals.map(m => (
                <button key={m.id} onClick={() => setEditing(m)}
                  className="w-full text-left bg-neutral-950 border border-neutral-800 rounded-lg p-4 hover:border-neutral-700 active:scale-[0.99]">
                  <div className="flex items-start justify-between mb-1.5 gap-3">
                    <div className="min-w-0 flex-1">
                      <div className="font-semibold text-neutral-50 truncate">{m.name}</div>
                      <div className="text-[10px] text-neutral-600 font-mono uppercase tracking-wider mt-0.5">
                        {m.source === 'photo' ? 'Photo' : 'Manual'} · {new Date(m.loggedAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}
                      </div>
                    </div>
                    <div className="font-mono text-orange-400 font-bold text-lg shrink-0">{m.kcal}<span className="text-[10px] text-neutral-500 ml-1">cal</span></div>
                  </div>
                  <div className="flex gap-3 text-[10px] font-mono text-neutral-500 uppercase tracking-wider">
                    <span>P {m.protein}g</span>
                    <span>C {m.carbs}g</span>
                    <span>F {m.fat}g</span>
                  </div>
                </button>
              ))}
            </div>
          )}

          {!state.bodyStats?.lastUpdated && (
            <div className="bg-orange-950/20 border border-orange-900/40 rounded-lg p-3 mb-4 text-xs text-orange-200">
              Set your weight + body fat % in Settings → Body Stats to dial in macro targets.
            </div>
          )}

          <div className="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black/95 to-transparent" style={{ paddingBottom: 'calc(1rem + env(safe-area-inset-bottom))' }}>
            <div className="max-w-2xl mx-auto">
              <button onClick={() => setAdding(true)}
                className="w-full py-5 rounded-xl font-bold uppercase tracking-[0.15em] text-sm bg-orange-500 hover:bg-orange-400 text-black active:scale-[0.99] flex items-center justify-center gap-2">
                <Plus size={18} strokeWidth={3} /> Add Meal
              </button>
            </div>
          </div>

          {adding && <AddMealView onSave={addMeal} onCancel={() => setAdding(false)} />}
          {editing && <EditMealView meal={editing} onSave={saveEdit} onDelete={deleteMeal} onCancel={() => setEditing(null)} />}
        </div>
      );
    };

    // ============================================================
    // HISTORY VIEW
    // ============================================================
    const HistoryView = ({ state, onBack }) => {
      const [filter, setFilter] = useState('all');
      const history = state.history || [];
      const filtered = filter === 'all' ? history : history.filter(s => s.dayId === filter);

      return (
        <div className="px-5 pb-24 pt-6 max-w-2xl mx-auto">
          <button onClick={onBack} className="flex items-center gap-1 text-neutral-400 hover:text-neutral-100 text-sm uppercase tracking-wider mb-6">
            <ChevronLeft size={18} /> Back
          </button>
          <div className="font-display text-3xl tracking-wide text-neutral-50 mb-6">HISTORY</div>
          <div className="flex gap-2 mb-6 flex-wrap">
            {['all', ...DAY_ORDER].map(f => (
              <button key={f} onClick={() => setFilter(f)}
                className={`px-3 py-1.5 rounded-lg text-xs uppercase tracking-wider font-mono border transition-all ${
                  filter === f ? 'bg-orange-500 text-black border-orange-500 font-bold' : 'bg-neutral-950 text-neutral-400 border-neutral-800 hover:border-neutral-700'
                }`}>
                {f === 'all' ? 'All' : DAY_TEMPLATES[f].name.split(' ')[0]}
              </button>
            ))}
          </div>
          {filtered.length === 0 ? (
            <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-8 text-center">
              <div className="text-neutral-500 text-sm">No sessions yet.</div>
            </div>
          ) : (
            <div className="space-y-2">
              {filtered.map((s, i) => {
                const amrap = s.mainSets?.find(set => set.isAmrap && set.actualReps);
                return (
                  <div key={i} className="bg-neutral-950 border border-neutral-800 rounded-lg p-4">
                    <div className="flex items-start justify-between mb-1">
                      <div>
                        <div className="font-semibold text-neutral-50">{s.name}</div>
                        <div className="text-xs text-neutral-500 font-mono">
                          C{s.cycle}·W{s.week} · {new Date(s.completedAt).toLocaleDateString()}
                        </div>
                      </div>
                      {amrap && (
                        <div className="text-right">
                          <div className="font-mono text-orange-400 font-bold">{amrap.weight}×{amrap.actualReps}</div>
                          <div className="text-[10px] uppercase tracking-wider text-neutral-500">{s.mainLift}</div>
                        </div>
                      )}
                    </div>
                    <div className="text-xs text-neutral-500 mt-2">
                      {s.accessories?.length || 0} accessories · {s.mainSets?.filter(x => x.completed).length || 0} main sets
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ============================================================
    // BODY STATS CARD (in Settings)
    // ============================================================
    const BodyStatsCard = ({ state, onUpdateState }) => {
      const bs = state.bodyStats || defaultBodyStats;
      const [weightStr, setWeightStr] = useState(String(bs.weight));
      const [bfStr, setBfStr] = useState(String(bs.bodyFatPct ?? ''));
      const [saved, setSaved] = useState(false);

      useEffect(() => {
        setWeightStr(String(bs.weight));
        setBfStr(String(bs.bodyFatPct ?? ''));
      }, [bs.weight, bs.bodyFatPct]);

      const save = () => {
        const w = parseFloat(weightStr);
        const bf = parseFloat(bfStr);
        if (isNaN(w) || w < 50 || w > 600) return;
        const nextBs = {
          ...bs,
          weight: Math.round(w * 10) / 10,
          bodyFatPct: !isNaN(bf) && bf > 3 && bf < 60 ? Math.round(bf * 10) / 10 : null,
          lastUpdated: new Date().toISOString(),
        };
        const history = [
          { date: todayKey(), weight: nextBs.weight, bodyFatPct: nextBs.bodyFatPct, source: 'manual' },
          ...(state.bodyStatsHistory || []),
        ].slice(0, 365);
        onUpdateState({ ...state, bodyStats: nextBs, bodyStatsHistory: history });
        setSaved(true);
        setTimeout(() => setSaved(false), 1500);
      };

      const updateField = (key, val) => {
        onUpdateState({ ...state, bodyStats: { ...bs, [key]: val } });
      };

      const targets = computeMacroTargets(bs);

      return (
        <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
          <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono mb-3">BODY STATS</div>
          <div className="text-sm text-neutral-400 mb-4">
            Update after weighing in. Macro targets recalculate automatically.
          </div>

          <div className="grid grid-cols-2 gap-3 mb-4">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">Weight (lb)</div>
              <input type="number" inputMode="decimal" value={weightStr} onChange={(e) => setWeightStr(e.target.value)}
                className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-3 text-neutral-50 font-mono text-xl font-bold text-center outline-none" />
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">Body Fat %</div>
              <input type="number" inputMode="decimal" value={bfStr} onChange={(e) => setBfStr(e.target.value)}
                className="w-full bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-3 text-neutral-50 font-mono text-xl font-bold text-center outline-none" />
            </div>
          </div>
          <button onClick={save}
            className="w-full py-3 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-xs font-bold hover:bg-orange-400 mb-4">
            {saved ? 'Saved' : 'Save weigh-in'}
          </button>

          <div className="grid grid-cols-2 gap-3 mb-4">
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">Goal BF %</div>
              <div className="flex items-center gap-1">
                <button onClick={() => updateField('goalBodyFatPct', Math.max(5, (bs.goalBodyFatPct || 15) - 1))} className="w-9 h-9 rounded border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900"><Minus size={14} /></button>
                <div className="flex-1 text-center font-mono text-lg font-bold text-neutral-50">{bs.goalBodyFatPct || 15}</div>
                <button onClick={() => updateField('goalBodyFatPct', Math.min(40, (bs.goalBodyFatPct || 15) + 1))} className="w-9 h-9 rounded border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900"><Plus size={14} /></button>
              </div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-mono mb-1">Activity</div>
              <select value={bs.activityLevel || 'active'}
                onChange={(e) => updateField('activityLevel', e.target.value)}
                className="w-full h-9 bg-neutral-900 border border-neutral-800 rounded text-neutral-100 text-sm px-2 outline-none focus:border-orange-500">
                {Object.entries(ACTIVITY_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
          </div>

          <div className="bg-neutral-900 border border-neutral-800 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-mono">Computed targets</div>
              <div className="text-[10px] uppercase tracking-wider text-orange-400 font-mono font-semibold">{targets.mode}</div>
            </div>
            <div className="grid grid-cols-4 gap-2 text-center">
              <div>
                <div className="font-mono text-lg font-bold text-neutral-50">{targets.kcal}</div>
                <div className="text-[9px] uppercase tracking-wider text-neutral-500">cal</div>
              </div>
              <div>
                <div className="font-mono text-lg font-bold text-neutral-50">{targets.protein}</div>
                <div className="text-[9px] uppercase tracking-wider text-neutral-500">protein</div>
              </div>
              <div>
                <div className="font-mono text-lg font-bold text-neutral-50">{targets.carbs}</div>
                <div className="text-[9px] uppercase tracking-wider text-neutral-500">carbs</div>
              </div>
              <div>
                <div className="font-mono text-lg font-bold text-neutral-50">{targets.fat}</div>
                <div className="text-[9px] uppercase tracking-wider text-neutral-500">fat</div>
              </div>
            </div>
            <div className="text-[10px] text-neutral-600 mt-2 font-mono">
              Maint ~{targets.maintenance} cal · BMR {targets.bmr}
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // SETTINGS VIEW
    // ============================================================
    const SettingsView = ({ state, syncStatus, onBack, onUpdateState, onResync }) => {
      const [showReset, setShowReset] = useState(false);
      const [secretInput, setSecretInput] = useState(cloudSync.getSecret() || '');
      const [secretSaved, setSecretSaved] = useState(false);
      const [shareCopied, setShareCopied] = useState(false);

      const updateTM = (lift, v) => {
        const val = Math.max(45, round5(v));
        onUpdateState({ ...state, trainingMaxes: { ...state.trainingMaxes, [lift]: val } });
      };

      const saveSecret = () => {
        const v = secretInput.trim();
        cloudSync.setSecret(v || null);
        setSecretSaved(true);
        setTimeout(() => setSecretSaved(false), 1500);
        onResync && onResync();
      };

      const generateShareToken = () => {
        onUpdateState({ ...state, shareToken: genShareToken() });
      };
      const revokeShareToken = () => {
        onUpdateState({ ...state, shareToken: null });
      };
      const shareUrl = state.shareToken ? `${window.location.origin}/share/${state.shareToken}` : '';
      const copyShareUrl = async () => {
        if (!shareUrl) return;
        try {
          await navigator.clipboard.writeText(shareUrl);
          setShareCopied(true);
          setTimeout(() => setShareCopied(false), 1500);
        } catch {
          window.prompt('Copy this link:', shareUrl);
        }
      };

      return (
        <div className="px-5 pb-24 pt-6 max-w-2xl mx-auto">
          <button onClick={onBack} className="flex items-center gap-1 text-neutral-400 hover:text-neutral-100 text-sm uppercase tracking-wider mb-6">
            <ChevronLeft size={18} /> Back
          </button>
          <div className="font-display text-3xl tracking-wide text-neutral-50 mb-8">SETTINGS</div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono mb-3">TRAINING MAXES</div>
            <div className="text-sm text-neutral-400 mb-4">Roughly 90% of your true 1-rep max for each lift.</div>
            {[{ id: 'bench', label: 'Bench Press' }, { id: 'squat', label: 'Back Squat' }, { id: 'deadlift', label: 'Deadlift' }].map(l => (
              <div key={l.id} className="mb-3 last:mb-0">
                <div className="text-xs text-neutral-400 mb-2">{l.label}</div>
                <div className="flex items-center gap-2">
                  <button onClick={() => updateTM(l.id, state.trainingMaxes[l.id] - 5)} className="w-12 h-12 rounded-lg border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900">
                    <Minus size={16} />
                  </button>
                  <div className="flex-1 h-12 bg-neutral-900 border border-neutral-800 rounded-lg flex items-center justify-center font-mono text-xl font-bold text-neutral-50">
                    {state.trainingMaxes[l.id]} <span className="text-neutral-500 text-sm font-normal ml-1">lb</span>
                  </div>
                  <button onClick={() => updateTM(l.id, state.trainingMaxes[l.id] + 5)} className="w-12 h-12 rounded-lg border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900">
                    <Plus size={16} />
                  </button>
                </div>
              </div>
            ))}
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="flex items-center justify-between mb-3">
              <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono">CLOUD SYNC</div>
              <SyncBadge status={syncStatus} />
            </div>
            <div className="text-sm text-neutral-400 mb-4">
              Paste your sync secret to mirror this device to the cloud (and to other devices using the same secret).
            </div>
            <div className="flex gap-2 mb-2">
              <input
                type="password"
                value={secretInput}
                onChange={(e) => setSecretInput(e.target.value)}
                placeholder="sync secret"
                className="flex-1 bg-neutral-900 border border-neutral-800 focus:border-orange-500 rounded-lg px-3 py-2 text-neutral-50 font-mono text-sm outline-none"
              />
              <button onClick={saveSecret} className="px-4 py-2 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-xs font-bold hover:bg-orange-400">
                {secretSaved ? 'Saved' : 'Save'}
              </button>
            </div>
            <button onClick={onResync} className="w-full mt-2 py-2 rounded-lg border border-neutral-800 text-neutral-400 uppercase tracking-wider text-xs font-semibold hover:bg-neutral-900">
              Force pull from cloud
            </button>
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono mb-3">COACH SHARE LINK</div>
            <div className="text-sm text-neutral-400 mb-4">
              Read-only link your PT can open in any browser. Rotating or revoking instantly invalidates the old link.
            </div>
            {state.shareToken ? (
              <>
                <div className="bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-3 mb-2 font-mono text-xs text-neutral-200 break-all">
                  {shareUrl}
                </div>
                <div className="flex gap-2">
                  <button onClick={copyShareUrl} className="flex-1 py-2 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-xs font-bold hover:bg-orange-400">
                    {shareCopied ? 'Copied' : 'Copy link'}
                  </button>
                  <button onClick={generateShareToken} className="flex-1 py-2 rounded-lg border border-neutral-800 text-neutral-300 uppercase tracking-wider text-xs font-semibold hover:bg-neutral-900">
                    Rotate
                  </button>
                  <button onClick={revokeShareToken} className="flex-1 py-2 rounded-lg border border-red-900/40 text-red-400 uppercase tracking-wider text-xs font-semibold hover:bg-red-950/30">
                    Revoke
                  </button>
                </div>
              </>
            ) : (
              <button onClick={generateShareToken} className="w-full py-3 rounded-lg bg-orange-500 text-black uppercase tracking-wider text-sm font-bold hover:bg-orange-400">
                Generate share link
              </button>
            )}
          </div>

          <BodyStatsCard state={state} onUpdateState={onUpdateState} />

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono mb-3">CURRENT POSITION</div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className="text-xs text-neutral-500 mb-1">Cycle</div>
                <div className="flex items-center gap-2">
                  <button onClick={() => onUpdateState({ ...state, cycle: Math.max(1, state.cycle - 1) })} className="w-9 h-9 rounded border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900"><Minus size={14} /></button>
                  <div className="flex-1 text-center font-mono text-xl font-bold text-neutral-50">{state.cycle}</div>
                  <button onClick={() => onUpdateState({ ...state, cycle: state.cycle + 1 })} className="w-9 h-9 rounded border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900"><Plus size={14} /></button>
                </div>
              </div>
              <div>
                <div className="text-xs text-neutral-500 mb-1">Week</div>
                <div className="flex items-center gap-2">
                  <button onClick={() => onUpdateState({ ...state, week: state.week === 1 ? 4 : state.week - 1 })} className="w-9 h-9 rounded border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900"><Minus size={14} /></button>
                  <div className="flex-1 text-center font-mono text-xl font-bold text-neutral-50">{state.week}</div>
                  <button onClick={() => onUpdateState({ ...state, week: state.week === 4 ? 1 : state.week + 1 })} className="w-9 h-9 rounded border border-neutral-800 flex items-center justify-center text-neutral-300 hover:bg-neutral-900"><Plus size={14} /></button>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-5 mb-4">
            <div className="text-xs uppercase tracking-[0.2em] text-neutral-500 font-mono mb-3">HOW PROGRESSION WORKS</div>
            <div className="space-y-3 text-sm text-neutral-300">
              <div>
                <div className="font-semibold text-neutral-100 mb-1">Main lifts</div>
                <div className="text-neutral-400 text-xs leading-relaxed">
                  4-week wave: 5s, 3s, PR week (5/3/1+), deload. After all 4 days × 4 weeks done, TM auto-bumps (+5 bench, +10 squat/DL).
                </div>
              </div>
              <div>
                <div className="font-semibold text-neutral-100 mb-1">Accessories</div>
                <div className="text-neutral-400 text-xs leading-relaxed">
                  Double progression. Hit top of rep range on ALL sets → green "+5 lb" tag appears next session.
                </div>
              </div>
              <div>
                <div className="font-semibold text-neutral-100 mb-1">Missed reps?</div>
                <div className="text-neutral-400 text-xs leading-relaxed">
                  If you fail AMRAP minimum on PR week, drop your TM 10% in settings and rebuild.
                </div>
              </div>
            </div>
          </div>

          <button onClick={() => setShowReset(true)} className="w-full py-4 rounded-xl border border-red-900/40 text-red-400 uppercase tracking-wider text-sm font-semibold hover:bg-red-950/30 flex items-center justify-center gap-2">
            <RotateCcw size={16} /> Reset All Progress
          </button>

          {showReset && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6" onClick={() => setShowReset(false)}>
              <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-6 w-full max-w-sm" onClick={(e) => e.stopPropagation()}>
                <div className="text-lg font-bold text-neutral-50 mb-2">Reset everything?</div>
                <div className="text-sm text-neutral-400 mb-6">Wipes all history. Can't be undone.</div>
                <div className="flex gap-2">
                  <button onClick={() => setShowReset(false)} className="flex-1 py-3 rounded-lg border border-neutral-800 text-neutral-300 uppercase tracking-wider text-sm font-semibold hover:bg-neutral-900">Cancel</button>
                  <button onClick={() => { onUpdateState({ ...defaultState }); setShowReset(false); }} className="flex-1 py-3 rounded-lg bg-red-900/60 text-red-100 uppercase tracking-wider text-sm font-bold hover:bg-red-900">Reset</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ============================================================
    // ROOT APP
    // ============================================================
    const App = () => {
      const [state, setState] = useState(() => loadState());
      const [view, setView] = useState('home');
      const [activeDayId, setActiveDayId] = useState(state.activeSession?.dayId || null);
      const [syncStatus, setSyncStatus] = useState(cloudSync.getSecret() ? 'syncing' : 'off');

      // Hook up sync status callback
      useEffect(() => { cloudSync.onStatus(setSyncStatus); }, []);

      // Initial cloud pull on mount. Subsequent re-pulls go through handleResync.
      useEffect(() => {
        let cancelled = false;
        (async () => {
          if (!cloudSync.getSecret()) { setSyncStatus('off'); return; }
          setSyncStatus('syncing');
          const { state: cloud, status } = await cloudSync.pull();
          if (cancelled) return;
          if (status === 'unauthorized') { setSyncStatus('unauthorized'); return; }
          if (status === 'error') { setSyncStatus('error'); return; }
          if (cloud) {
            setState((prev) => ({ ...prev, ...cloud, activeSession: cloud.activeSession ?? prev.activeSession }));
            setSyncStatus('synced');
          } else {
            const s = await cloudSync.push(loadState());
            setSyncStatus(s);
          }
        })();
        return () => { cancelled = true; };
      }, []);

      useEffect(() => {
        saveState(state);
        if (cloudSync.getSecret()) cloudSync.scheduleSave(state);
      }, [state]);

      useEffect(() => {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hide');
      }, []);

      const handleStart = (dayId) => { setActiveDayId(dayId); setView('session'); };
      const handleComplete = (session) => {
        setState(finishSession(state, session));
        setActiveDayId(null);
        setView('home');
      };
      const handleCancel = () => setView('home');

      // Called from Settings after the secret changes or a manual pull is requested.
      const handleResync = async () => {
        if (!cloudSync.getSecret()) { setSyncStatus('off'); return; }
        setSyncStatus('syncing');
        const { state: cloud, status } = await cloudSync.pull();
        if (status === 'unauthorized') { setSyncStatus('unauthorized'); return; }
        if (status === 'error') { setSyncStatus('error'); return; }
        if (cloud) {
          setState((prev) => ({ ...prev, ...cloud, activeSession: cloud.activeSession ?? prev.activeSession }));
          setSyncStatus('synced');
        } else {
          const s = await cloudSync.push(state);
          setSyncStatus(s);
        }
      };

      return (
        <div className="min-h-screen bg-black text-neutral-100">
          {view === 'home' && <HomeView state={state} syncStatus={syncStatus} onStart={handleStart} onHistory={() => setView('history')} onSettings={() => setView('settings')} onDiet={() => setView('diet')} />}
          {view === 'session' && activeDayId && <SessionView state={state} dayId={activeDayId} onComplete={handleComplete} onCancel={handleCancel} onUpdateState={setState} />}
          {view === 'history' && <HistoryView state={state} onBack={() => setView('home')} />}
          {view === 'diet' && <DietView state={state} onBack={() => setView('home')} onUpdateState={setState} />}
          {view === 'settings' && <SettingsView state={state} syncStatus={syncStatus} onBack={() => setView('home')} onUpdateState={setState} onResync={handleResync} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
